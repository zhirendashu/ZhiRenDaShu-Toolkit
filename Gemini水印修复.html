    <style>
        :root {
            --bg-dark: #05070a;
            --border-glass: rgba(255,255,255,0.09);
            --accent-sky: #0ea5e9;
            --accent-primary: #6366f1;
            --accent-green: #10b981;
            --accent-rose: #f43f5e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --font: 'Outfit','Noto Sans SC',sans-serif;
            --ease: all 0.32s cubic-bezier(0.23,1,0.32,1);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font);background:var(--bg-dark);color:var(--text-main);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}

        /* 背景光斑 */
        .bg-blobs{position:fixed;inset:0;z-index:-1;overflow:hidden;filter:blur(90px);opacity:0.35;pointer-events:none}
        .blob{position:absolute;border-radius:50%;animation:bmv 28s infinite alternate}
        .blob-1{width:50vw;height:50vw;background:radial-gradient(circle,#6366f1,transparent 70%);top:-15%;right:-10%}
        .blob-2{width:40vw;height:40vw;background:radial-gradient(circle,#10b981,transparent 70%);bottom:-10%;left:-10%;animation-delay:-11s}
        .blob-3{width:28vw;height:28vw;background:radial-gradient(circle,#0ea5e9,transparent 70%);top:38%;left:32%;animation-delay:-20s;opacity:.55}
        @keyframes bmv{from{transform:translate(0,0)scale(1)}to{transform:translate(55px,38px)scale(1.1)}}

        /* 顶部栏 */
        .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border-glass);background:rgba(5,7,10,0.65);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;flex-shrink:0}
        .topbar-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
        .back-btn{display:flex;align-items:center;gap:5px;color:var(--text-dim);text-decoration:none;font-size:.84rem;font-weight:500;padding:6px 14px;border-radius:100px;border:1px solid var(--border-glass);background:rgba(255,255,255,0.04);transition:var(--ease)}
        .back-btn:hover{color:var(--text-main);border-color:rgba(255,255,255,0.18)}
        .tool-title{font-size:1rem;font-weight:700;letter-spacing:-.3px}
        .badge-pill{font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:100px;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--accent-green)}
        .dl-btn{display:flex;align-items:center;gap:7px;padding:9px 22px;border-radius:100px;background:linear-gradient(135deg,var(--accent-green),var(--accent-sky));color:#fff;font-size:.88rem;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(16,185,129,.35);transition:var(--ease)}
        .dl-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(16,185,129,.5)}
        .dl-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

        /* 主体 */
        .workspace{flex:1;display:flex;overflow:hidden;min-height:0}

        /* 左侧控制台 */
        .sidebar{width:290px;flex-shrink:0;border-right:1px solid var(--border-glass);background:rgba(8,11,18,.55);overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:22px}

        .sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
        .sec{display:flex;flex-direction:column;gap:12px}
        .sec-title{font-size:.68rem;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:8px}
        .sec-title::after{content:'';flex:1;height:1px;background:var(--border-glass)}

        /* 拖拽区 */
        #drop-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;padding:28px 16px;border-radius:20px;border: 2px dashed rgba(99, 102, 241, 0.28) !important;background: rgba(99, 102, 241, 0.03) !important;transition:var(--ease);text-align:center}

        .dz-icon{font-size:2.6rem;line-height:1}
        .dz-title{font-size:.95rem;font-weight:700}
        .dz-sub{font-size:.78rem;color:var(--text-dim)}

        /* 状态提示 */
        .status-card{padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid var(--border-glass);font-size:.82rem;color:var(--text-dim);line-height:1.6}
        .status-card.ready{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25);color:var(--accent-green)}
        .status-card.done{background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.25);color:#a5b4fc}

        /* 操作按钮组 */
        .btn-group{display:flex;flex-direction:column;gap:8px}
        .action-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;border-radius:12px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;font-family:var(--font);transition:var(--ease)}

        .btn-fix:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(16,185,129,.45)}
        .btn-fix:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .btn-reset{background:rgba(255,255,255,.05);color:var(--text-dim);border:1px solid var(--border-glass)}
        .btn-reset:hover{background:rgba(255,255,255,.08);color:var(--text-main)}

        /* 算法说明 */
        .algo-card{padding:14px 16px;border-radius:14px;background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.2);font-size:.78rem;color:var(--text-dim);line-height:1.7}
        .algo-card strong{color:#a5b4fc;display:block;margin-bottom:4px}

        /* 右侧画板 */
        .canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:28px;overflow:auto;position:relative;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center}
        .empty-icon{font-size:4rem;opacity:.3}
        .empty-text{color:var(--text-dim);font-size:.95rem}

        /* 画布容器 */
        #canvas-wrap{display:none;width:100%;max-width:800px}
        #canvas-wrap canvas{display:block;width:100%;height:auto;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5)}

        #size-info{position:absolute;bottom:10px;right:14px;font-size:.68rem;color:rgba(255,255,255,.3)}

        /* 移动端 */
        @media(max-width:768px){
            .workspace{flex-direction:column}
            .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border-glass);max-height:50vh}
            .topbar{padding:10px 14px}
            .dl-btn span{display:none}
        }
    



/* ==================== Unified Canvas & Workspace Design System ==================== */

/* AI套件专属高亮对齐 */

}
.badge-pill, .header-badge {

<script src="./gemini-alpha-maps.js"></script>
<script>
const __AUTH_SIGNATURE = "179689535&0814";

const ENGINE = { ALPHA_NOISE: 3/255, ALPHA_THRESHOLD: 0.002, MAX_ALPHA: 0.99, LOGO_COLOR: 255 };

const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fixBtn    = document.getElementById('fix-btn');
const resetBtn  = document.getElementById('reset-btn');
const dlBtn     = document.getElementById('dl-btn');
const btnSec    = document.getElementById('btn-sec');
const statusCard= document.getElementById('status-card');
const emptyHint = document.getElementById('empty-hint');
const canvasWrap= document.getElementById('canvas-wrap');
const canvas    = document.getElementById('main-canvas');
const sizeInfo  = document.getElementById('size-info');
const ctx       = canvas.getContext('2d', { willReadFrequently: true });

let currentImg = null;

function setStatus(msg, type='') {
    statusCard.textContent = msg;
    statusCard.className = 'status-card' + (type ? ' ' + type : '');
}

function detectStyle(w, h) {
    return (w > 1024 && h > 1024) ? { size:96, mx:64, my:64 } : { size:48, mx:32, my:32 };
}

function applyRepair(imgData, mask, pos) {
    const { x, y, size } = pos;
    const px = imgData.data;
    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
            const idx = ((y+r)*imgData.width + (x+c))*4;
            const raw = mask[r*size+c];
            const sig = Math.max(0, raw - ENGINE.ALPHA_NOISE);
            if (sig < ENGINE.ALPHA_THRESHOLD) continue;
            const a = Math.min(raw, ENGINE.MAX_ALPHA);
            const inv = 1 - a;
            for (let ch = 0; ch < 3; ch++) {
                px[idx+ch] = Math.max(0, Math.min(255, Math.round((px[idx+ch] - a*ENGINE.LOGO_COLOR)/inv)));
            }
        }
    }
}

function loadFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
        const img = new Image();
        img.onload = () => {
            currentImg = img;
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            emptyHint.style.display = 'none';
            canvasWrap.style.display = 'block';
            btnSec.style.display = 'flex';
            dlBtn.disabled = true;
            fixBtn.disabled = false;
            fixBtn.style.display = 'flex';
            setStatus(`已加载 ${img.width}×${img.height}px，可以开始修复`, 'ready');
            sizeInfo.textContent = `${img.width}×${img.height}px`;
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => loadFile(fileInput.files[0]));

fixBtn.addEventListener('click', () => {
    if (!currentImg) return;
    const style = detectStyle(canvas.width, canvas.height);
    const mask = typeof getEmbeddedAlphaMap === 'function' ? getEmbeddedAlphaMap(style.size) : null;
    if (!mask) { alert('核心遮罩数据加载中，请刷新重试'); return; }
    const pos = { x: canvas.width - style.mx - style.size, y: canvas.height - style.my - style.size, size: style.size };
    const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
    applyRepair(imgData, mask, pos);
    ctx.putImageData(imgData, 0, 0);
    fixBtn.style.display = 'none';
    dlBtn.disabled = false;
    setStatus('修复完成！水印已物理级消除，点击右上角下载', 'done');
});

resetBtn.addEventListener('click', () => {
    currentImg = null;
    emptyHint.style.display = 'flex';
    canvasWrap.style.display = 'none';
    btnSec.style.display = 'none';
    dlBtn.disabled = true;
    fixBtn.style.display = 'flex';
    setStatus('等待图片上传…');
    sizeInfo.textContent = '';
});

dlBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.download = `Gemini修复_植人大树_${Date.now()}.png`;
    a.href = canvas.toDataURL('image/png', 1.0);
    a.click();
});
</script>

<div id="modern-toast"></div>
<script>
(function() {
    // 1. Alert Override with Modern Toast
    window.showToast = function(msg, type="info") {
        const toast = document.getElementById("modern-toast");
        if (!toast) return;
        const icon = type === 'error' ? '❌' : (type === 'success' ? '✅' : '✨');
        toast.innerHTML = `${icon} <span style="margin-left:4px;">${msg}</span>`;
        toast.classList.add("show");
        if(window._toastTimer) clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => toast.classList.remove("show"), 3000);
    };
    window.alert = function(msg) {
        window.showToast(msg, 'error');
    };

    // 2. Double-Click Range Reset
    function initRangeResets() {
        document.querySelectorAll('input[type="range"]').forEach(slider => {
            if (slider._hasDblclickReset) return;
            slider._hasDblclickReset = true;
            const defVal = slider.getAttribute('value') || slider.value || '0';
            slider.addEventListener('dblclick', () => {
                slider.value = defVal;
                slider.dispatchEvent(new Event('input', { bubbles: true }));
                slider.dispatchEvent(new Event('change', { bubbles: true }));
            });
        });
    }

    // 3. Eyedropper API integration for color inputs
    function initEyedropper() {
        if (!window.EyeDropper) return;
        document.querySelectorAll('input[type="color"]').forEach(colorInput => {
            if (colorInput.dataset.hasEyedropper) return;
            colorInput.dataset.hasEyedropper = "true";
            
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.innerHTML = '🎨';
            btn.title = '屏幕吸色';
            btn.style.marginLeft = '6px';
            btn.style.padding = '4px 6px';
            btn.style.background = 'rgba(255,255,255,0.06)';
            btn.style.border = '1px solid rgba(255,255,255,0.1)';
            btn.style.borderRadius = '6px';
            btn.style.color = '#fff';
            btn.style.cursor = 'pointer';
            btn.style.fontSize = '0.75rem';
            btn.style.display = 'inline-flex';
            btn.style.alignItems = 'center';
            btn.style.justifyContent = 'center';
            btn.style.height = '28px';
            btn.style.transition = '0.2s';
            btn.style.verticalAlign = 'middle';
            
            btn.onmouseover = () => btn.style.background = 'rgba(255,255,255,0.12)';
            btn.onmouseout = () => btn.style.background = 'rgba(255,255,255,0.06)';
            
            if (colorInput.nextSibling) {
                colorInput.parentNode.insertBefore(btn, colorInput.nextSibling);
            } else {
                colorInput.parentNode.appendChild(btn);
            }
            
            btn.onclick = async (e) => {
                e.preventDefault();
                try {
                    const dropper = new EyeDropper();
                    const result = await dropper.open();
                    colorInput.value = result.sRGBHex;
                    colorInput.dispatchEvent(new Event('input', { bubbles: true }));
                    colorInput.dispatchEvent(new Event('change', { bubbles: true }));
                } catch(err) {}
            };
        });
    }

    // Initialize all components
    function initAll() {
        initRangeResets();
        initEyedropper();
    }
    
    document.addEventListener("DOMContentLoaded", initAll);
    if (document.readyState === "interactive" || document.readyState === "complete") {
        initAll();
    }
})();
</script>
