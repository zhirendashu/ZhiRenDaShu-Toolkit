<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>封面比例转换工具 · 竖版转16:9专业版</title>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
      /* 背景光斑 */
      .bg-blobs{position:fixed;inset:0;z-index:-1;overflow:hidden;filter:blur(90px);opacity:0.28;pointer-events:none}
      .blob{position:absolute;border-radius:50%;animation:bmv 28s infinite alternate}
      .blob-1{width:50vw;height:50vw;background:radial-gradient(circle,#5b8dee,transparent 70%);top:-15%;right:-10%}
      .blob-2{width:40vw;height:40vw;background:radial-gradient(circle,#a78bfa,transparent 70%);bottom:-10%;left:-10%;animation-delay:-11s}
      .blob-3{width:25vw;height:25vw;background:radial-gradient(circle,#34d399,transparent 70%);top:38%;left:32%;animation-delay:-20s;opacity:.4}
      @keyframes bmv{from{transform:translate(0,0)scale(1)}to{transform:translate(55px,38px)scale(1.1)}}
      /* ==================== 基础重置 ==================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0d0f14;
        --surface: #161a24;
        --surface-glass: rgba(22, 26, 36, 0.72);
        --card: #1e2333;
        --border: #2c3347;
        --accent: #5b8dee;
        --accent2: #a78bfa;
        --text: #e2e8f0;
        --sub: #7a859e;
        --green: #34d399;
        --radius: 12px;
        --shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      }
      body {
        font-family: 'Outfit', 'Noto Sans SC', sans-serif;
        background: #05070a;
        color: var(--text);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* ==================== 头部 ==================== */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        background: rgba(5,7,10,0.65);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255,255,255,.09);
        position: sticky;
        top: 0;
        z-index: 100;
        flex-shrink: 0;
      }
      .header-back {
        display: flex; align-items: center; gap: 5px;
        color: #94a3b8; text-decoration: none;
        font-size: .84rem; font-weight: 500;
        padding: 6px 14px; border-radius: 100px;
        border: 1px solid rgba(255,255,255,.09);
        background: rgba(255,255,255,.04);
        transition: all .3s ease;
      }
      .header-back:hover { color: #f8fafc; border-color: rgba(255,255,255,.18); }
      header h1 {
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: -0.3px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .header-badge {
        font-size: .68rem; font-weight: 700; padding: 3px 10px; border-radius: 100px;
        background: rgba(91,141,238,.15); border: 1px solid rgba(91,141,238,.3); color: #93c5fd;
      }

      /* ==================== 主体双栏布局 ==================== */
      .main-container {
        display: flex;
        flex-wrap: nowrap;
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px;
        gap: 32px;
        width: 100%;
        height: calc(100vh - 100px); /* 减去页头，填满屏幕 */
        box-sizing: border-box;
      }

      /* ==================== 左侧预览区 ==================== */
      .left-col {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
        height: 100%;
      }
      .preview-header {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }
      #main-preview-box {
        width: 100%;
        flex: 1;
        background-color: #080a0f !important;
            background-image: radial-gradient(circle at center, rgba(99, 102, 241, 0.05) 0%, transparent 75%) !important;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.85) !important;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        box-shadow: inset 0 20px 140px rgba(0,0,0,0.7);
        min-height: 0;
      }
      #inner-drop-zone { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 14px; cursor: pointer;
        width: 440px; height: 280px; max-width: 88vw;
        border-radius: 24px; border: 2px dashed rgba(99, 102, 241, 0.28) !important;
        background: rgba(99, 102, 241, 0.03) !important; transition: 0.3s;
        z-index: 5;
        /* 未载入图片时可交互（触发点击上传），载入后由JS设为pointer-events:none */
      }
      #main-preview-box:hover #inner-drop-zone { border-color: var(--accent); background: rgba(91, 141, 238, .1); }
      .dz-icon { font-size: 2.8rem; line-height: 1; }
      .dz-title { font-size: 1.05rem; font-weight: 700; color: #fff; }
      .dz-sub { font-size: .84rem; color: var(--sub); }
      .dz-chip {
        font-size: .72rem; color: #94a3b8;
        padding: 5px 14px; border-radius: 100px;
        border: 1px solid rgba(255, 255, 255, 0.09); background: rgba(255, 255, 255, .03);
      }
      #main-canvas {
            
            background-size: 20px 20px !important;
            background-color: #11131a !important;
        /* Canvas 物理尺寸由 JS 的 .width/.height 属性控制 */
        /* CSS 负责显示尺寸：width:100% 横向铺满，height:auto 按 aspect-ratio 等比适配 */
        /* 注意：object-fit 对 canvas 无效，用 aspect-ratio 配合 height:auto 实现等比 */
        width: 100%;
        height: auto;
        max-height: 100%;
        display: none;
        
        background-size: 20px 20px !important;
        background-color: #11131a !important;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(255, 255, 255, 0.06) !important;
      }

      /* ==================== 右侧面板区 ==================== */
      .right-col {
        width: 380px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
        height: 100%;
        overflow-y: auto;
        padding-right: 8px;
        scroll-behavior: smooth;
      }
      .right-col::-webkit-scrollbar { width: 6px; }
      .right-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

      /* ==================== 拖拽上传模块 ==================== */
      #drop-zone {
        border: 2px dashed var(--border);
        border-radius: var(--radius);
        background: rgba(255,255,255,0.02);
        padding: 24px 16px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      #drop-zone:hover,
      #drop-zone.hover {
        border-color: var(--accent);
        background: #1a2035;
      }
      #drop-zone svg {
        opacity: 0.5;
        width: 36px;
        height: 36px;
      }
      .dz-label {
        font-weight: 600;
        font-size: 0.95rem;
      }
      .dz-sub {
        font-size: 0.75rem;
        color: var(--sub);
      }
      #file-input {
        display: none;
      }

      /* ==================== 分组设置卡片 ==================== */
      .panel-card {
        background: var(--surface-glass);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--radius);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        /* 移除 GSAP 动画初始状态，确保离线环境下始终可见 */
      }
      .panel-title {
        font-size: 0.85rem;
        color: var(--accent);
        font-weight: 600;
        text-transform: uppercase;
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
        margin-bottom: 4px;
      }

      /* 控件行 */
      .control-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .control-row label {
        font-size: 0.8rem;
        color: var(--sub);
        display: flex;
        justify-content: space-between;
      }
      .range-val {
        color: var(--text);
      }

      select,
      input[type="range"] {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        padding: 8px;
        font-size: 0.85rem;
        outline: none;
      }
      input[type="range"] {
        padding: 0;
        height: 4px;
        accent-color: var(--accent);
      }

      /* ==================== 背景模式 Radio ==================== */
      .radio-group {
        display: flex;
        background: var(--card);
        border-radius: 6px;
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .radio-label {
        flex: 1;
        text-align: center;
        padding: 8px 0;
        font-size: 0.8rem;
        color: var(--sub);
        cursor: pointer;
        border-right: 1px solid var(--border);
        transition: 0.2s;
      }
      .radio-label:last-child {
        border-right: none;
      }
      .radio-label:hover {
        background: #242a3e;
      }
      .radio-label.active {
        background: var(--accent);
        color: #fff;
        font-weight: 600;
      }
      .radio-input {
        display: none;
      }

      /* 子视图切换 */
      .bg-sub-view, .layout-sub-view {
        display: none;
        flex-direction: column;
        gap: 12px;
        margin-top: 8px;
      }
      .bg-sub-view.active, .layout-sub-view.active {
        display: flex;
      }

      /* 自定义文字输入 */
      .text-input-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .text-input-row input[type="text"] {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        padding: 8px;
        font-size: 0.85rem;
        outline: none;
      }

      /* 自定义底图 */
      .bg-upload-inner {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #bg-upload-btn, #wm-upload-btn {
        flex: 1;
        padding: 6px;
        font-size: 0.8rem;
        background: var(--card);
        border: 1px dashed var(--border);
        color: var(--sub);
        border-radius: 6px;
        cursor: pointer;
      }
      #bg-clear-btn, #wm-clear-btn {
        display: none;
        padding: 6px 10px;
        font-size: 0.8rem;
        background: #3b1515;
        border: 1px solid #5c2020;
        color: #f87171;
        border-radius: 6px;
        cursor: pointer;
      }
      #bg-clear-btn.visible, #wm-clear-btn.visible {
        display: block;
      }

      /* 纯色选取 */
      .color-picker-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #solid-color-input {
        width: 40px;
        height: 30px;
        padding: 0;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        background: transparent;
      }

      .btn:active, .radio-label:active, .style-btn:active, #drop-zone:active {
        transform: scale(0.98);
      }

      /* ==================== 底部队列区域 ==================== */
      .queue-section {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 24px 60px;
        width: 100%;
        display: none;
        flex-direction: column;
        gap: 16px;
      }
      .queue-section.visible {
        display: flex;
      }
      .queue-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }
      .btn {
        padding: 9px 18px;
        border-radius: 8px;
        font-size: 0.84rem;
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        position: relative;
        overflow: hidden;
        letter-spacing: 0.03em;
      }
      .btn::after {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
        opacity: 0;
        transition: opacity 0.2s;
      }
      .btn:hover::after { opacity: 1; }
      .btn:active { transform: scale(0.97); }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        box-shadow: 0 4px 20px rgba(91,141,238,0.4);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(91,141,238,0.6);
      }
      .btn-danger {
        background: rgba(248,113,113,0.08);
        border: 1px solid rgba(248,113,113,0.25);
        color: #f87171;
      }
      .btn-danger:hover {
        background: rgba(59,21,21,0.9);
        border-color: rgba(248,113,113,0.5);
        transform: translateY(-1px);
      }

      #preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
      }
      .grid-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        position: relative;
      }
      .grid-card img {
        width: 100%;
        height: auto;     /* 高度由图片真实比例决定，不强制 16:9 */
        display: block;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
      }
      .grid-card-info {
        padding: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .grid-card-name {
        font-size: 0.75rem;
        color: var(--sub);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 120px;
      }
      .del-btn {
        background: #3b1515;
        color: #f87171;
        border: none;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 0.7rem;
        cursor: pointer;
      }

      /* ==================== 全屏拖拽遮罩 ==================== */
      #drag-overlay {
        position: fixed;
        inset: 0;
        background: rgba(13, 15, 20, 0.85);
        backdrop-filter: blur(4px);
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        color: var(--accent2);
        font-size: 2rem;
        font-weight: bold;
        pointer-events: none;
        border: 4px dashed var(--accent2);
        margin: 16px;
        border-radius: 20px;
      }
      #drag-overlay.visible {
        display: flex;
      }

      /* ==================== 全局状态浮层 ==================== */
      #loading-toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a2035;
        color: #fff;
        padding: 10px 24px;
        border-radius: 99px;
        font-size: 0.85rem;
        font-weight: 500;
        display: none;
        z-index: 1000;
        box-shadow: var(--shadow);
        border: 1px solid var(--accent);
      }

      /* 底部署名 */
      footer {
        text-align: center;
        font-size: 0.75rem;
        color: #3a4358;
        padding-bottom: 24px;
      }

      /* ===== 移动端适配 (<768px) ===== */
      @media (max-width: 768px) {
        body { height: auto; overflow-y: auto; }
        header h1 { white-space: normal; font-size: 1.1rem; }
        header p { display: none; } /* 隐藏副标题防止溢出 */

        /* 主容器变竖向堆叠 */
        .main-container {
          flex-direction: column;
          height: auto;
          padding: 12px;
          gap: 16px;
        }

        /* 预览区固定高度，防止 Canvas 被压缩到 0 */
        .left-col {
          height: 40vh;
          min-height: 200px;
          flex-shrink: 0;
        }

        /* 右侧面板变全宽 */
        .right-col {
          width: 100%;
          height: auto;
          overflow-y: visible;
          padding-right: 0;
        }
      }
    



/* ==================== Unified Canvas & Workspace Design System ==================== */
/* 1. Workspace Backdrop: Slate navy (#080a0f) + Center Radial Glow + Inner Shadow */
.preview-area, #main-preview-box, .canvas-container-wrap, .preview-pane, .canvas-area, #compare-container {
    background-color: #080a0f !important;
    background-image: radial-gradient(circle at center, rgba(99, 102, 241, 0.05) 0%, transparent 75%) !important;
    box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.85) !important;
}

/* 2. Artboard / Canvas Card: Elegant 24px Drop Shadow + Subtle 1px White Border */
#main-canvas, #canvas, .canvas-box, .canvas-container, #ratio-frame, #canvas-container, #display-canvas, .stage {
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(255, 255, 255, 0.06) !important;
}

/* 3. Transparent Checkerboard Pattern (Only inside the artboards of tools that support transparency) */
#main-canvas, .canvas-box, #ratio-frame, #canvas-container {
    background-image: repeating-conic-gradient(rgba(255, 255, 255, 0.03) 0% 25%, transparent 0% 50%) !important;
    background-size: 20px 20px !important;
    background-color: #11131a !important;
}

/* 4. Unified Drag-and-Drop Zones: Dotted Indigo Border + Translucent Indigo Background + Micro Glow on Hover */
#inner-drop-zone, #drop-zone, #upload-zone, .upload-zone {
    border: 2px dashed rgba(99, 102, 241, 0.28) !important;
    background: rgba(99, 102, 241, 0.03) !important;
    transition: all 0.3s ease !important;
}
#inner-drop-zone:hover, #inner-drop-zone.dragover,
#drop-zone:hover, #drop-zone.dragover,
#upload-zone:hover, #upload-zone.drag-over,
.upload-zone:hover, .upload-zone.drag-over {
    border-color: #6366f1 !important;
    background: rgba(99, 102, 241, 0.08) !important;
    box-shadow: 0 0 30px rgba(99, 102, 241, 0.1) !important;
}

/* 视觉套件专属高亮对齐 */
:root {
    --accent: #6366f1 !important;
    --accent-primary: #6366f1 !important;
}
.badge-pill, .header-badge {
    background: rgba(99, 102, 241, 0.15) !important;
    border: 1px solid rgba(99, 102, 241, 0.3) !important;
    color: #a5b4fc !important;
}
input[type="range"] {
    accent-color: #6366f1 !important;
}
.btn-primary, #export-btn {
    background: linear-gradient(135deg, #6366f1, #818cf8) !important;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4) !important;
    color: #fff !important;
}
.btn-primary:hover, #export-btn:hover {
    box-shadow: 0 8px 28px rgba(99, 102, 241, 0.6) !important;
    color: #fff !important;
}
select:focus, input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
    border-color: #6366f1 !important;
    box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2) !important;
}
</style>

  <body>
    <!-- 动态背景光斑 -->
    <div class="bg-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <!-- 拖拽全局高亮提示 -->
    <div id="drag-overlay">
      <svg
        width="64"
        height="64"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
      松开鼠标立即处理图片
    </div>

    <div id="loading-toast">正在处理...</div>

    <script>
      // === IndexedDB 联动 Bridge ===
      const BridgeDB = {
        name: 'ZhiRenDaShu_Bridge',
        store: 'image_transfer',
        async save(images) {
          const db = await this.open();
          const tx = db.transaction(this.store, 'readwrite');
          const s = tx.objectStore(this.store);
          await s.clear();
          for (const img of images) {
            await s.add(img);
          }
        },
        async load() {
          const db = await this.open();
          return new Promise((res) => {
            const tx = db.transaction(this.store, 'readonly');
            const s = tx.objectStore(this.store);
            const req = s.getAll();
            req.onsuccess = () => {
              s.clear(); // 取出后清空缓存
              res(req.result);
            };
          });
        },
        open() {
          return new Promise((res) => {
            const req = indexedDB.open(this.name, 1);
            req.onupgradeneeded = () => req.result.createObjectStore(this.store, { autoIncrement: true });
            req.onsuccess = () => res(req.result);
          });
        }
      };
    </script>

    <header>
      <a href="index.html" class="header-back">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回首页
      </a>

    <script>
      /**

      const __AUTH_SIGNATURE = "179689535&0814";

      // ==================== Premium iOS Mobile Save Handler ====================
      async function triggerMobileSave(blobOrUrl, defaultFileName) {
          const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
          let blob = blobOrUrl;
          if (typeof blobOrUrl === 'string') {
              if (blobOrUrl.startsWith('data:')) {
                  const res = await fetch(blobOrUrl);
                  blob = await res.blob();
              } else {
                  try {
                      const res = await fetch(blobOrUrl);
                      blob = await res.blob();
                  } catch (e) {}
              }
          }
          const objectUrl = blob instanceof Blob ? URL.createObjectURL(blob) : blobOrUrl;
          const finalUrl = typeof blobOrUrl === 'string' && !blobOrUrl.startsWith('data:') ? blobOrUrl : objectUrl;

          if (isMobile && navigator.canShare && navigator.share && blob instanceof Blob) {
              try {
                  const file = new File([blob], defaultFileName, { type: blob.type || 'image/png' });
                  if (navigator.canShare({ files: [file] })) {
                      await navigator.share({
                          files: [file],
                          title: '保存图片',
                          text: '选择“存储图像”保存到相册'
                      });
                      return;
                  }
              } catch (e) {
                  console.warn('Share API failed, showing manual save dialog...', e);
                  if (e.name === 'AbortError') return;
              }
          }

          if (isMobile) {
              const existing = document.getElementById('mobile-save-overlay');
              if (existing) existing.remove();

              const overlay = document.createElement('div');
              overlay.id = 'mobile-save-overlay';
              overlay.className = 'mobile-save-overlay';
              
              const style = document.createElement('style');
              style.textContent = `
                  .mobile-save-overlay {
                      position: fixed; inset: 0; z-index: 99999;
                      background: rgba(13, 15, 20, 0.9); backdrop-filter: blur(15px);
                      display: flex; flex-direction: column; align-items: center; justify-content: center;
                      padding: 20px; animation: fadeInSave 0.3s ease;
                  }
                  .mobile-save-card {
                      background: rgba(30, 35, 51, 0.95); border: 1px solid rgba(255, 255, 255, 0.1);
                      border-radius: 20px; padding: 20px; max-width: 90%; max-height: 85vh;
                      display: flex; flex-direction: column; align-items: center; gap: 15px;
                      box-shadow: 0 10px 40px rgba(0,0,0,0.5); animation: slideUpSave 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                  }
                  .mobile-save-img {
                      max-width: 100%; max-height: 50vh; border-radius: 12px;
                      border: 1px solid rgba(255, 255, 255, 0.1); object-fit: contain;
                      -webkit-touch-callout: default; pointer-events: auto;
                  }
                  .mobile-save-title {
                      font-size: 1.1rem; font-weight: 600; color: #fff; text-align: center;
                      background: linear-gradient(135deg, #5b8dee, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                  }
                  .mobile-save-tip {
                      font-size: 0.85rem; color: #94a3b8; text-align: center; line-height: 1.4; padding: 0 10px;
                  }
                  .mobile-save-btn {
                      background: linear-gradient(135deg, #5b8dee, #818cf8); border: none; color: white;
                      padding: 10px 24px; border-radius: 100px; font-size: 0.9rem; font-weight: 600;
                      cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(91, 141, 238, 0.3);
                  }
                  .mobile-save-btn:active { transform: scale(0.95); }
                  @keyframes fadeInSave { from { opacity: 0; } to { opacity: 1; } }
                  @keyframes slideUpSave { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
              `;
              document.head.appendChild(style);

              overlay.innerHTML = `
                  <div class="mobile-save-card">
                      <div class="mobile-save-title">图片保存指南</div>
                      <img class="mobile-save-img" src="${finalUrl}" alt="Generated Image" />
                      <div class="mobile-save-tip">💡 提示：请<b>长按上方图片</b>选择“保存到相册”或“存储图像”即可存入手机相册。</div>
                      <button class="mobile-save-btn">我知道了</button>
                  </div>
              `;

              overlay.querySelector('.mobile-save-btn').onclick = () => {
                  overlay.remove();
                  if (blob instanceof Blob && objectUrl.startsWith('blob:')) URL.revokeObjectURL(objectUrl);
              };
              
              overlay.onclick = (e) => {
                  if (e.target === overlay) {
                      overlay.remove();
                      if (blob instanceof Blob && objectUrl.startsWith('blob:')) URL.revokeObjectURL(objectUrl);
                  }
              };

              document.body.appendChild(overlay);
              return;
          }

          const a = document.createElement('a');
          a.href = finalUrl;
          a.download = defaultFileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          if (blob instanceof Blob && objectUrl.startsWith('blob:')) {
              setTimeout(() => URL.revokeObjectURL(objectUrl), 10000);
          }
      }

      if (window.saveAs) {
          const originalSaveAs = window.saveAs;
          window.saveAs = function(blobOrUrl, name, options) {
              const isImage = typeof name === 'string' && /\.(png|jpg|jpeg|webp|tiff)$/i.test(name);
              if (isImage) {
                  triggerMobileSave(blobOrUrl, name);
              } else {
                  originalSaveAs(blobOrUrl, name, options);
              }
          };
      }

      // ==================== 全局状态 ====================
      // 图片对象列表 [{ id, img, name, finalCanvas }]
      let imageList = [];
      let activeIndex = 0; // 左侧显示哪张图
      let customBgImg = null;
      let watermarkImg = null; // 水印图片对象
      let bgMode = "blur"; // blur | custom | solid
      let layoutMode = "classic"; // classic | xhs | polaroid | long
      let counterId = 0; // 自增 ID 保证唯一

      let renderTimeout = null; // 防抖句柄

      // ==================== DOM元素 ====================
      const canvasDom = document.getElementById("main-canvas");
      const ctx = canvasDom.getContext("2d");
      const placeholder = document.getElementById("inner-drop-zone");
      const previewInfo = document.getElementById("preview-info");
      const grid = document.getElementById("preview-grid");

      // 控件
      const ctrlW = document.getElementById("out-width");
      const ctrlFmt = document.getElementById("out-format");

      const ctrlBlur = document.getElementById("blur-amount");
      const valBlur = document.getElementById("blur-val");
      const ctrlDark = document.getElementById("dark-amount");
      const valDark = document.getElementById("dark-val");

      const ctrlScale = document.getElementById("scale-amount");
      const valScale = document.getElementById("scale-val");
      const ctrlPosY = document.getElementById("posy-amount");
      const valPosY = document.getElementById("posy-val");
      const ctrlColor = document.getElementById("solid-color-input");

      // 水印组件
      const wmUploadBtn = document.getElementById("wm-upload-btn");
      const wmClearBtn = document.getElementById("wm-clear-btn");
      const wmFileInput = document.getElementById("wm-file-input");
      const wmSettings = document.getElementById("wm-settings");
      
      const ctrlWmRef = document.getElementById("wm-reference");
      const ctrlWmPos = document.getElementById("wm-position");
      const ctrlWmScale = document.getElementById("wm-scale");
      const valWmScale = document.getElementById("wm-scale-val");
      const ctrlWmOpacity = document.getElementById("wm-opacity");
      const valWmOpacity = document.getElementById("wm-opacity-val");

      const ctrlWmDx = document.getElementById("wm-dx");
      const valWmDx = document.getElementById("wm-dx-val");
      const ctrlWmDy = document.getElementById("wm-dy");
      const valWmDy = document.getElementById("wm-dy-val");

      // 新增：排版模式相关控件
      const ctrlPolaroidColor = document.getElementById("polaroid-color-input");
      const ctrlPolaroidText = document.getElementById("polaroid-text");
      const ctrlPolaroidTextColor = document.getElementById("polaroid-text-color");
      const ctrlLongGap = document.getElementById("long-gap-amount");
      const valLongGap = document.getElementById("long-gap-val");
      const ctrlLongBg = document.getElementById("long-bg-color");

      // 组件
      const dragOverlay = document.getElementById("drag-overlay");
      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");
      const loading = document.getElementById("loading-toast");
      const transferBtn = document.getElementById("transfer-btn");
      const refineBtn = document.getElementById("refine-btn");

      // 生命周期：检查是否有来自拼图工具的联动数据
      window.addEventListener('DOMContentLoaded', async () => {
        const data = await BridgeDB.load();
        if (data && data.length > 0) {
          showLoading("正在从拼图大师接收数据...");
          const items = [];
          for (const item of data) {
             const img = new Image();
             await new Promise(res => {
               img.onload = res;
               img.src = URL.createObjectURL(item.blob);
             });
             counterId++;
             items.push({ id: counterId, img, name: item.name, finalCanvas: null });
          }
          imageList.push(...items);
          rebuildAllAndRefreshUI();
        }
      });

      // 1. 防抖渲染触发器（绑定给所有范围滑块和下拉控制）
      const inputsToWatch = [
        ctrlW, ctrlBlur, ctrlDark, ctrlScale, ctrlPosY, ctrlColor,
        ctrlWmRef, ctrlWmPos, ctrlWmScale, ctrlWmOpacity, ctrlWmDx, ctrlWmDy,
        ctrlPolaroidColor, ctrlPolaroidText, ctrlPolaroidTextColor, ctrlLongGap, ctrlLongBg
      ];
      inputsToWatch.forEach((el) => {
        el.addEventListener("input", () => {
          // 同步文本显示
          if (el === ctrlBlur) valBlur.textContent = el.value;
          if (el === ctrlDark) valDark.textContent = el.value + "%";
          if (el === ctrlScale) valScale.textContent = el.value + "%";
          if (el === ctrlPosY) valPosY.textContent = el.value + "%";
          if (el === ctrlWmScale) valWmScale.textContent = el.value + "%";
          if (el === ctrlWmOpacity) valWmOpacity.textContent = el.value + "%";
          if (el === ctrlWmDx) valWmDx.textContent = el.value;
          if (el === ctrlWmDy) valWmDy.textContent = el.value;
          if (el === ctrlLongGap) valLongGap.textContent = el.value + "px";

          triggerRender();
        });
      });

      // 2. 背景模式切换
      document.querySelectorAll("#bg-mode-group .radio-label").forEach((lbl) => {
        lbl.addEventListener("click", () => {
          document
            .querySelectorAll("#bg-mode-group .radio-label")
            .forEach((n) => n.classList.remove("active"));
          lbl.classList.add("active");
          bgMode = lbl.dataset.mode;

          document
            .querySelectorAll(".bg-sub-view")
            .forEach((v) => v.classList.remove("active"));
          document.getElementById("view-" + bgMode).classList.add("active");

          triggerRender();
        });
      });

      // 2.5 排版模式切换
      document.querySelectorAll("#layout-mode-group .radio-label").forEach((lbl) => {
        lbl.addEventListener("click", () => {
          document
            .querySelectorAll("#layout-mode-group .radio-label")
            .forEach((n) => n.classList.remove("active"));
          lbl.classList.add("active");
          layoutMode = lbl.dataset.mode;

          document
            .querySelectorAll(".layout-sub-view")
            .forEach((v) => v.classList.remove("active"));
            
          const subView = document.getElementById("view-layout-" + layoutMode);
          if (subView) subView.classList.add("active");

          // 细节控制：长图模式隐藏无关控件
          const bgPanel = document.getElementById("bg-mode-group").parentElement;
          const posRow = ctrlPosY.parentElement;
          
          if (layoutMode === "long") {
             bgPanel.style.display = 'none';
             posRow.style.display = 'none';
          } else if (layoutMode === "polaroid") {
             bgPanel.style.display = 'none';
             posRow.style.display = 'flex';
          } else {
             bgPanel.style.display = 'flex';
             posRow.style.display = 'flex';
          }

          triggerRender();
        });
      });

      // 3. 自定义底图上传
      document
        .getElementById("bg-upload-btn")
        .addEventListener("click", () =>
          document.getElementById("bg-file-input").click(),
        );
      document
        .getElementById("bg-file-input")
        .addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
              customBgImg = img;
              document.getElementById("bg-upload-btn").textContent =
                "✓ 已选择：" + file.name;
              document.getElementById("bg-clear-btn").classList.add("visible");
              // 若当前是 custom 模式，立刻重绘
              if (bgMode === "custom") triggerRender();
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
          e.target.value = "";
        });
      document.getElementById("bg-clear-btn").addEventListener("click", () => {
        customBgImg = null;
        document.getElementById("bg-upload-btn").textContent =
          "➕ 点击上传背景底图";
        document.getElementById("bg-clear-btn").classList.remove("visible");
        if (bgMode === "custom") triggerRender();
      });

      // 3.5. 水印上传
      wmUploadBtn.addEventListener("click", () => wmFileInput.click());
      wmFileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            watermarkImg = img;
            wmUploadBtn.textContent = "✓ 已加载水印：" + file.name;
            wmClearBtn.classList.add("visible");
            wmSettings.style.display = "flex";
            triggerRender();
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        e.target.value = "";
      });
      wmClearBtn.addEventListener("click", () => {
        watermarkImg = null;
        wmUploadBtn.textContent = "➕ 点击上传水印图片";
        wmClearBtn.classList.remove("visible");
        wmSettings.style.display = "none";
        triggerRender();
      });

      // 4. 全局拖拽响应 (防闪烁技巧：监听 window 的 dragenter/dragleave 判断)
      let dragCounter = 0;
      window.addEventListener("dragenter", (e) => {
        e.preventDefault();
        dragCounter++;
        if (dragCounter === 1) dragOverlay.classList.add("visible");
      });
      window.addEventListener("dragleave", (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter === 0) dragOverlay.classList.remove("visible");
      });
      window.addEventListener("dragover", (e) => e.preventDefault());
      window.addEventListener("drop", (e) => {
        e.preventDefault();
        dragCounter = 0;
        dragOverlay.classList.remove("visible");
        handleFiles([...e.dataTransfer.files]);
      });
      dropZone.addEventListener("click", () => fileInput.click());
      // 点击主预览区（含占位提示层）也可触发文件上传
      document.getElementById("main-preview-box").addEventListener("click", (e) => {
        // 仅在未载入图片时（占位提示可见时）触发，或点击 Canvas 时不拦截
        if (!imageList.length) fileInput.click();
      });
      fileInput.addEventListener("change", (e) => {
        handleFiles([...e.target.files]);
        e.target.value = "";
      });

      // 5. ZIP 下载和清空功能
      document.getElementById("clear-btn").addEventListener("click", () => {
        imageList = [];
        activeIndex = 0;
        renderQueue();
        updateMainPreview();
      });
      document
        .getElementById("download-btn")
        .addEventListener("click", downloadAll);
      
      transferBtn.addEventListener("click", async () => {
        if (!imageList.length) return;
        showLoading("正在打包传送...");
        const dataToSave = [];
        for (const item of imageList) {
          const blob = await new Promise(res => item.finalCanvas.toBlob(res, 'image/png'));
          dataToSave.push({ name: item.name, blob });
        }
        await BridgeDB.save(dataToSave);
        window.location.href = "小红书拼图工具.html?from=bridge";
      });

      refineBtn.addEventListener("click", async () => {
        if (!imageList.length) return;
        showLoading("正在准备精修素材...");
        const item = imageList[activeIndex]; 
        const blob = await new Promise(res => item.finalCanvas.toBlob(res, 'image/png'));
        await BridgeDB.save([{ name: item.name, blob }]);
        window.location.href = "封面精修大师.html?from=bridge";
      });

      // ==================== 核心处理逻辑 ====================

      function handleFiles(files) {
        const imgs = files.filter((f) => f.type.startsWith("image/"));
        if (!imgs.length) return;

        showLoading("加载图片中...");
        let loaded = 0;
        const newItems = [];

        imgs.forEach((file) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              counterId++;
              newItems.push({
                id: counterId,
                img,
                name: file.name,
                finalCanvas: null,
              });
              loaded++;
              if (loaded === imgs.length) {
                imageList.push(...newItems);
                activeIndex = imageList.length - newItems.length; // 焦点跳到新加的第一张
                rebuildAllAndRefreshUI();
              }
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      function triggerRender(delay = 300) {
        if (!imageList.length) return;
        clearTimeout(renderTimeout);
        renderTimeout = setTimeout(() => {
          rebuildAllAndRefreshUI();
        }, delay);
      }

      async function rebuildAllAndRefreshUI() {
        showLoading("正在渲染...");
        // 重新处理所有图片的 Canvas 画布
        for (let i = 0; i < imageList.length; i++) {
          const item = imageList[i];
          item.finalCanvas = buildCanvasCore(item.img);
          // 留出时间渲染 UI 防止卡死
          await new Promise((res) => setTimeout(res, 0));
        }

        if (activeIndex >= imageList.length)
          activeIndex = Math.max(0, imageList.length - 1);

        renderQueue();
        updateMainPreview();
        hideLoading();
      }

      // 获取控件数值
      function getParams() {
        return {
          outW: parseInt(ctrlW.value),
          blur: parseInt(ctrlBlur.value),
          dark: parseInt(ctrlDark.value) / 100,
          scale: parseInt(ctrlScale.value) / 100,
          posY: parseInt(ctrlPosY.value) / 100,
          color: ctrlColor.value,
          wmRef: ctrlWmRef.value,
          wmPos: ctrlWmPos.value,
          wmScale: parseInt(ctrlWmScale.value) / 100,
          wmOpacity: parseInt(ctrlWmOpacity.value) / 100,
          wmDx: parseInt(ctrlWmDx.value) / 100,
          wmDy: parseInt(ctrlWmDy.value) / 100,
          // 新增排版参数
          polaroidColor: ctrlPolaroidColor.value,
          polaroidText: ctrlPolaroidText.value.trim(),
          polaroidTextColor: ctrlPolaroidTextColor.value,
          longGap: parseInt(ctrlLongGap.value),
          longBgColor: ctrlLongBg.value
        };
      }

      function buildCanvasCore(img) {
        const p = getParams();
        let outH;

        // 决定最终画布宽高
        if (layoutMode === "classic") {
           outH = Math.round((p.outW * 9) / 16);
        } else if (layoutMode === "xhs" || layoutMode === "polaroid") {
           outH = Math.round((p.outW * 4) / 3);
        } else if (layoutMode === "long") {
           // 长图模式由专用合成函数处理，这里为单个图片提供一个等比画布
           outH = Math.round(p.outW / (img.width / img.height));
        }

        const cvs = document.createElement("canvas");
        cvs.width = p.outW;
        cvs.height = outH;
        const cx = cvs.getContext("2d");

        // ======= 1. 背景绘制层 =======
        if (layoutMode === "polaroid") {
           // 拍立得固定底色
           cx.fillStyle = p.polaroidColor;
           cx.fillRect(0, 0, p.outW, outH);
        } else if (layoutMode === "long") {
           // 长图底板色
           cx.fillStyle = p.longBgColor;
           cx.fillRect(0, 0, p.outW, outH);
        } else {
            // 普通与小红书模式使用原有背景逻辑
            if (bgMode === "solid") {
              cx.fillStyle = p.color;
              cx.fillRect(0, 0, p.outW, outH);
            } else {
              // blur 或 custom
              const src = bgMode === "custom" && customBgImg ? customBgImg : img;
              const bgAsp = src.width / src.height;
              const canvAsp = p.outW / outH;
              let bw, bh;
              if (bgAsp > canvAsp) {
                bh = outH;
                bw = outH * bgAsp;
              } else {
                bw = p.outW;
                bh = p.outW / bgAsp;
              }
              const bx = (p.outW - bw) / 2;
              const by = (outH - bh) / 2;

              if (bgMode === "blur" && p.blur > 0) {
                cx.filter = `blur(${p.blur}px)`;
                cx.drawImage(
                  src,
                  bx - p.blur * 2,
                  by - p.blur * 2,
                  bw + p.blur * 4,
                  bh + p.blur * 4,
                );
                cx.filter = "none";
              } else {
                cx.drawImage(src, bx, by, bw, bh);
              }

              if (p.dark > 0) {
                cx.fillStyle = `rgba(0,0,0,${p.dark})`;
                cx.fillRect(0, 0, p.outW, outH);
              }
            }
        }

        // ======= 2. 原图绘制层 =======
        const imgAsp = img.width / img.height;
        let fw, fh, fx, fy;

        if (layoutMode === "polaroid") {
            // 拍立得图片内边距算法：左右上留 4%，下部留 22% 写字
            const padX = p.outW * 0.04;
            const padTop = p.outW * 0.04;
            const padBottom = outH * 0.22;
            const maxW = p.outW - padX * 2;
            const maxH = outH - padTop - padBottom;
            
            // 加入用户 scale 控制
            const baseW = maxW * p.scale;
            const baseH = maxH * p.scale;

            if (imgAsp > (baseW / baseH)) {
               fw = baseW;
               fh = baseW / imgAsp;
            } else {
               fh = baseH;
               fw = baseH * imgAsp;
            }

            fx = (p.outW - fw) / 2;
            fy = padTop + (maxH - fh) * p.posY;
            cx.drawImage(img, fx, fy, fw, fh);

            // 绘制相框边框阴影感
            cx.strokeStyle = "rgba(0,0,0,0.05)";
            cx.lineWidth = 2;
            cx.strokeRect(fx, fy, fw, fh);
            
            // 绘制文字
            if (p.polaroidText) {
                cx.fillStyle = p.polaroidTextColor;
                cx.textAlign = "center";
                cx.textBaseline = "middle";
                const fontSize = Math.floor(outH * 0.04);
                cx.font = `500 ${fontSize}px "Inter", "PingFang SC", sans-serif`;
                cx.fillText(p.polaroidText, p.outW / 2, outH - (padBottom / 2));
            }

        } else if (layoutMode === "long") {
            // 长图单张充满渲染
            fw = p.outW;
            fh = p.outW / imgAsp;
            cx.drawImage(img, 0, 0, fw, fh);
        } else {
            // 经典留白模式（包含横版 / 小红书3:4）
            fh = outH * p.scale * 0.88;
            fw = fh * imgAsp;
            if (fw > p.outW) {
              fw = p.outW * p.scale;
              fh = fw / imgAsp;
            }

            fx = (p.outW - fw) / 2;
            fy = Math.max(0, outH - fh) * p.posY;
            cx.drawImage(img, fx, fy, fw, fh);
        }

        // ======= 3. 绘制水印 =======
        if (watermarkImg) {
          cx.globalAlpha = p.wmOpacity;
          
          let refX, refY, refW, refH;
          if (p.wmRef === "image") {
            // 对于长图，贴紧图片
            if (layoutMode === "long") {
                refX = 0; refY = 0; refW = p.outW; refH = p.outW / imgAsp;
            } else {
                refX = fx; refY = fy; refW = fw; refH = fh;
            }
          } else {
            refX = 0; refY = 0; refW = p.outW; refH = outH;
          }

          const baseWmWidth = p.outW * p.wmScale;
          const wmAsp = watermarkImg.width / watermarkImg.height;
          const wmWidth = baseWmWidth;
          const wmHeight = baseWmWidth / wmAsp;

          const padding = Math.min(p.outW, outH) * 0.03;

          let wx = 0,
            wy = 0;
          switch (p.wmPos) {
            case "top-left":
              wx = refX + padding;
              wy = refY + padding;
              break;
            case "top-right":
              wx = refX + refW - wmWidth - padding;
              wy = refY + padding;
              break;
            case "bottom-left":
              wx = refX + padding;
              wy = refY + refH - wmHeight - padding;
              break;
            case "bottom-right":
              wx = refX + refW - wmWidth - padding;
              wy = refY + refH - wmHeight - padding;
              break;
            case "center":
              wx = refX + (refW - wmWidth) / 2;
              wy = refY + (refH - wmHeight) / 2;
              break;
          }
          
          wx += p.outW * p.wmDx;
          wy += outH * p.wmDy; // 修复原本用 p.outH 的 bug，改用动态 outH

          cx.drawImage(watermarkImg, wx, wy, wmWidth, wmHeight);
          cx.globalAlpha = 1.0;
        }

        return cvs;
      }

      // 全局缓存保存长图画布结果
      let cachedLongCanvas = null;

      function updateMainPreview() {
        if (!imageList.length) {
          canvasDom.style.display = "none";
          // 显示占位提示区，恢复可点击状态
          if (placeholder) {
            placeholder.style.display = "flex";
            placeholder.style.pointerEvents = "auto";
          }
          previewInfo.textContent = "当前未载入图片";
          return;
        }
        canvasDom.style.display = "block";
        // 隐藏占位提示区，并禁用其事件（避免遮挡 Canvas 操作）
        if (placeholder) {
          placeholder.style.display = "none";
          placeholder.style.pointerEvents = "none";
        }

        if (layoutMode === "long") {
           // 长图模式下，将所有列表中的图片从上到下绘制在一张大画布上
           const p = getParams();
           let totalHeight = 0;
           imageList.forEach((item, idx) => {
               totalHeight += item.finalCanvas.height;
               if (idx < imageList.length - 1) totalHeight += p.longGap;
           });

           const longCvs = document.createElement("canvas");
           longCvs.width = p.outW;
           longCvs.height = totalHeight;
           const cx = longCvs.getContext("2d");
           
           // 画长图底色
           cx.fillStyle = p.longBgColor;
           cx.fillRect(0, 0, longCvs.width, longCvs.height);

           let currentY = 0;
           imageList.forEach((item, idx) => {
               cx.drawImage(item.finalCanvas, 0, currentY);
               currentY += item.finalCanvas.height;
               if (idx < imageList.length - 1) currentY += p.longGap;
           });

           cachedLongCanvas = longCvs; // 保存给下载用
           previewInfo.textContent = `预览长图拼接共 ${imageList.length} 张`;

           canvasDom.width = longCvs.width;
           canvasDom.height = longCvs.height;
           // 通过 aspect-ratio 告知浏览器画布比例，配合 CSS object-fit:contain 自适应缩放
           canvasDom.style.aspectRatio = `${longCvs.width} / ${longCvs.height}`;
           // 移除可能残留的内联 width/height 样式
           canvasDom.style.width = "";
           canvasDom.style.height = "";
           ctx.clearRect(0, 0, canvasDom.width, canvasDom.height);
           ctx.drawImage(longCvs, 0, 0);

        } else {
            const item = imageList[activeIndex];
            previewInfo.textContent = `预览第 ${activeIndex + 1} 张 (${item.name})`;

            canvasDom.width = item.finalCanvas.width;
            canvasDom.height = item.finalCanvas.height;
            // 通过 aspect-ratio 告知浏览器画布比例，配合 CSS object-fit:contain 自适应缩放
            canvasDom.style.aspectRatio = `${item.finalCanvas.width} / ${item.finalCanvas.height}`;
            // 移除可能残留的内联 width/height 样式（防止遮盖 CSS 布局）
            canvasDom.style.width = "";
            canvasDom.style.height = "";
            ctx.clearRect(0, 0, canvasDom.width, canvasDom.height);
            ctx.drawImage(item.finalCanvas, 0, 0);
        }
      }

      function renderQueue() {
        grid.innerHTML = "";
        const qs = document.getElementById("queue-section");
        document.getElementById("queue-title").textContent =
          `已载入 ${imageList.length} 张图片`;

        if (imageList.length === 0) {
          qs.classList.remove("visible");
          return;
        }
        qs.classList.add("visible");

        imageList.forEach((item, index) => {
          const cView = document.createElement("canvas");
          // 缩略图尺寸和 finalCanvas 比例同步，不强制 16:9
          const thumbW = 320;
          const thumbH = Math.round(thumbW * item.finalCanvas.height / item.finalCanvas.width);
          cView.width = thumbW;
          cView.height = thumbH;
          cView.getContext("2d").drawImage(item.finalCanvas, 0, 0, thumbW, thumbH);

          const srcDataUrl = cView.toDataURL("image/jpeg", 0.6);

          const card = document.createElement("div");
          card.className = "grid-card";

          card.innerHTML = `
            <img src="${srcDataUrl}" title="点击设为大图预览" />
            <div class="grid-card-info">
              <div class="grid-card-name" title="${item.name}">${item.name}</div>
              <button class="del-btn" title="删除">✕</button>
            </div>
          `;

          // 点击图片切换主预览
          card.querySelector("img").addEventListener("click", () => {
            activeIndex = index;
            updateMainPreview();
          });

          // 删除
          card.querySelector(".del-btn").addEventListener("click", () => {
            imageList.splice(index, 1);
            if (activeIndex >= imageList.length)
              activeIndex = Math.max(0, imageList.length - 1);
            renderQueue();
            updateMainPreview();
          });

          grid.appendChild(card);
        });
      }

      async function downloadAll() {
        if (!imageList.length) return;
        showLoading("正在保存图片...");

        try {
          const format = ctrlFmt.value;
          const ext =
            {
              "image/jpeg": "jpg",
              "image/png": "png",
              "image/webp": "webp",
              "image/tiff": "tiff",
            }[format] || "jpg";
          const quality =
            format === "image/png" || format === "image/tiff"
              ? undefined
              : 0.95;

          if (layoutMode === "long") {
             // 导出且仅导出这一张长图
             const fileName = `拼接长图_${imageList.length}张.${ext}`;
             const blob = await new Promise((resolve) =>
                cachedLongCanvas.toBlob(resolve, format, quality),
             );
             saveAs(blob, fileName);
          } else {
             // 遍历生成 Blob 并直接下载
             for (let i = 0; i < imageList.length; i++) {
                const item = imageList[i];
                const baseName = item.name.replace(/\.[^.]+$/, "");
                const fileName = `${baseName}_导出.${ext}`;

                // 将 Canvas 转换为 Blob
                const blob = await new Promise((resolve) =>
                   item.finalCanvas.toBlob(resolve, format, quality),
                );

                // 使用 FileSaver 直接下载
                saveAs(blob, fileName);

                // 增加延时，防止浏览器拦截批量下载
                if (i < imageList.length - 1) {
                   await new Promise((r) => setTimeout(r, 400));
                }
             }
          }
        } catch (e) {
          console.error(e);
          alert("保存失败，详情见控制台");
        }
        hideLoading();
      }

      function showLoading(msg) {
        loading.textContent = msg;
        loading.style.display = "block";
      }
      function hideLoading() {
        loading.style.display = "none";
      }

      // GSAP 动画初始化
      window.addEventListener('load', () => {
        gsap.to(".panel-card", {
          x: 0,
          opacity: 1,
          duration: 0.8,
          stagger: 0.1,
          ease: "power2.out"
        });
      });

            btn.style.verticalAlign = 'middle';
            
            btn.onmouseover = () => btn.style.background = 'rgba(255,255,255,0.12)';
            btn.onmouseout = () => btn.style.background = 'rgba(255,255,255,0.06)';
            
            if (colorInput.nextSibling) {
                colorInput.parentNode.insertBefore(btn, colorInput.nextSibling);
            } else {
                colorInput.parentNode.appendChild(btn);
            }
            
            btn.onclick = async (e) => {
                e.preventDefault();
                try {
                    const dropper = new EyeDropper();
                    const result = await dropper.open();
                    colorInput.value = result.sRGBHex;
                    colorInput.dispatchEvent(new Event('input', { bubbles: true }));
                    colorInput.dispatchEvent(new Event('change', { bubbles: true }));
                } catch(err) {}
            };
        });
    }

    // Initialize all components
    function initAll() {
        initRangeResets();
        initEyedropper();
    }
    
    document.addEventListener("DOMContentLoaded", initAll);
    if (document.readyState === "interactive" || document.readyState === "complete") {
        initAll();
    }
})();
</script>
<!-- Unified Premium UX End -->
