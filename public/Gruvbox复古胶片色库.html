<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gruvbox 复古胶片色库 · 植人大树</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    /* 动态背景光斑 */
    .bg-blobs{position:fixed;inset:0;z-index:0;overflow:hidden;filter:blur(90px);opacity:0.15;pointer-events:none}
    .blob{position:absolute;border-radius:50%;animation:bmv 28s infinite alternate}
    .blob-1{width:45vw;height:45vw;background:radial-gradient(circle,#fabd2f,transparent 70%);top:-10%;right:-5%}
    .blob-2{width:35vw;height:35vw;background:radial-gradient(circle,#fe8019,transparent 70%);bottom:-10%;left:-5%;animation-delay:-11s}
    .blob-3{width:20vw;height:20vw;background:radial-gradient(circle,#cc241d,transparent 70%);top:40%;left:30%;animation-delay:-20s}
    @keyframes bmv{from{transform:translate(0,0)scale(1)}to{transform:translate(45px,30px)scale(1.1)}}

    /* 统一 Header */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 200;
      background: rgba(30,28,28,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(250,189,47,0.15);
      display: flex; align-items: center; padding: 0 20px; gap: 14px;
    }
    .header-back {
      display: flex; align-items: center; gap: 6px; color: var(--fg4);
      text-decoration: none; font-family: 'Outfit', sans-serif;
      font-size: 0.82rem; font-weight: 500;
      padding: 6px 14px; border-radius: 100px;
      border: 1px solid rgba(250,189,47,0.2);
      background: rgba(250,189,47,0.05);
      transition: all .25s ease; white-space: nowrap;
    }
    .header-back:hover { color: var(--yellow); border-color: rgba(250,189,47,0.5); background: rgba(250,189,47,0.1); }
    .header-back svg { width: 14px; height: 14px; }
    .header-logo {
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1rem;
      letter-spacing: -0.03em; color: var(--yellow);
    }

    /* 按钮系统 - 极客科技风 */
    .copy-btn {
      flex: 1; padding: 10px; border-radius: 6px;
      border: 1px solid var(--bg2); background: rgba(40,40,40,0.8);
      color: var(--fg1); cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 4px; transition: all .2s ease;
      font-family: 'Outfit', sans-serif; position: relative; overflow: hidden;
    }
    .copy-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(250,189,47,.08),transparent); opacity:0; transition:opacity .2s; }
    .copy-btn:hover { background: rgba(80,73,69,0.8); border-color: rgba(250,189,47,0.3); }
    .copy-btn:hover::before { opacity:1; }
    .copy-btn:active { transform: scale(0.97); }
    .copy-btn span.label { font-size: 0.68rem; color: var(--fg4); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .copy-btn span.hex { font-family: 'Outfit', monospace; font-size: 0.92rem; font-weight: 700; letter-spacing: 0.5px; }
    :root {
      --bg0: #282828; --bg1: #3c3836; --bg2: #504945;
      --fg1: #ebdbb2; --fg4: #a89984;
      --yellow: #fabd2f; --red: #cc241d;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Outfit', Georgia, "PingFang SC", "Microsoft YaHei", serif; 
      background-color: var(--bg0); color: var(--fg1); min-height: 100vh; display: flex;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 4px 4px;
      padding-top: 56px;
    }

    .sidebar { width: 320px; background: var(--bg1); border-right: 1px solid var(--bg2); padding: 30px 20px; display: flex; flex-direction: column; gap: 20px; box-shadow: 4px 0 15px rgba(0,0,0,0.5); z-index: 10; }
    .project-title { font-size: 1.6rem; font-weight: bold; color: var(--yellow); letter-spacing: 1px; white-space: nowrap; word-break: keep-all; }
    .project-desc { font-size: 0.9rem; line-height: 1.8; color: var(--fg4); background: rgba(0,0,0,0.2); padding: 16px; border-radius: 4px; border-left: 4px solid var(--red); }
    .project-desc b { color: var(--fg1); }

    .main-content { flex: 1; padding: 40px; overflow-y: auto; height: 100vh; }
    .section-title { font-size: 1.4rem; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 1px dashed var(--bg2); color: var(--yellow); }
    .subtitle { font-size: 0.85rem; color: var(--fg4); margin-bottom: 20px; display: block; }
    
    /* 单色极简网格 */
    .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .color-card { background: var(--bg2); padding: 6px; padding-bottom: 20px; border-radius: 6px; box-shadow: 2px 4px 10px rgba(0,0,0,0.5); cursor: pointer; transition: transform 0.2s; border: 1px solid var(--bg1); }
    .color-card:hover { transform: translateY(-4px); z-index: 2; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.8); border-color: var(--yellow); }
    .color-preview { width: 100%; height: 100px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: sans-serif; font-size: 0.8rem; transition: 0.2s; color: transparent; font-weight: bold; }
    .color-card:hover .color-preview { color: rgba(255,255,255,0.9); text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .color-info { padding-top: 10px; text-align: center; display: flex; flex-direction: column; gap: 4px; }
    .c-name { font-weight: bold; font-size: 0.9rem; color: var(--fg1);}
    .c-hex { font-family: monospace; font-size: 0.8rem; color: var(--fg4); text-transform: uppercase; }

    /* 影视级最佳组合网格 */
    .combo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .combo-card { background: #3c3836; border: 1px solid #504945; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .combo-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); border-color: #7c6f64; }
    
    .combo-demo { height: 160px; background: #181818; border-top: 3px solid #000; border-bottom: 3px solid #000; display: flex; align-items: center; justify-content: center; position: relative; }
    
    .text-wrapper { position: relative; filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.8)); display: flex; align-items: center; justify-content: center; }
    .demo-text { position: relative; font-size: 2.8rem; font-weight: 900; letter-spacing: 2px; font-family: "PingFang SC", "Microsoft YaHei", "Impact", sans-serif; text-align: center; color: var(--stroke-color); -webkit-text-stroke: var(--stroke-width) var(--stroke-color); }
    .demo-text::before { content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; color: var(--fill-color); -webkit-text-stroke: 0; z-index: 2; pointer-events: none; }

    .combo-action { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .combo-title { font-size: 1.1rem; font-weight: bold; color: var(--fg1); }
    .copy-group { display: flex; gap: 8px; }
    .copy-btn { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--bg2); background: #282828; color: var(--fg1); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; }
    .copy-btn:hover { background: #504945; }
    .copy-btn span.label { font-size: 0.7rem; color: var(--fg4); }
    .copy-btn span.hex { font-family: monospace; font-size: 0.95rem; font-weight: bold; }

    #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fabd2f; color: #282828; padding: 12px 30px; border-radius: 30px; font-weight: 800; box-shadow: 0 10px 25px rgba(250, 189, 47, 0.4); transition: 0.4s; opacity: 0; pointer-events: none; z-index: 1000; }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* 移动端适配 */
    @media (max-width: 768px) {
      body { flex-direction: column; height: auto; padding-top: 56px; }
      .sidebar { width: 100%; height: auto; box-shadow: none; border-right: none; border-bottom: 1px solid var(--bg2); padding: 16px; }
      .project-title { font-size: 1.2rem; white-space: normal; }
      .main-content { height: auto; overflow-y: visible; padding: 16px; }
      .combo-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- 动态背景光斑 -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- 统一导航 Header -->
  <header class="site-header">
    <a href="index.html" class="header-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      返回首页
    </a>
    <span class="header-logo">Gruvbox 胶片暗房</span>
  </header>

  <script>const __AUTH_SIGNATURE = "179689535&0814";</script>

  <div class="sidebar">
    <!-- 移除旧版返回按钮，已由 Header 统一提供 -->
    <div class="project-title">🋎️ Gruvbox 胶片暗房</div>
    <div class="project-desc">
      <h3>【项目说明与直观预览】</h3><br>
      被誉为极客圈的“复古胶片感”巅峰配色。<br>
      抛弃了绝对的纯黑和纯白，用温暖大地色和老旧泛黄相纸感，打造最高级的文艺海报质感。<br><br>
      * 点击任意色块或排版组合，全自动无损外描边提取！
    </div>
  </div>

  <div class="main-content">
    
    <!-- 绝佳经典沉淀组合区（引入字幕渲染技术） -->
    <h2 class="section-title" style="border-bottom:none; margin-bottom: 0;">🎬 胶片厚重感·影视配色推荐</h2>
    <span class="subtitle">采用真实字幕外扩技术，点击分离复制字色与边色</span>
    <div class="combo-grid" id="grid-combo"></div>

    <h2 class="section-title" style="margin-top: 20px;">🧱 胶片相纸原色提取区</h2>
    <div class="color-grid" id="grid-bg"></div>
    <div class="color-grid" id="grid-fg"></div>
    <div class="color-grid" id="grid-normal"></div>
    <div class="color-grid" id="grid-bright"></div>

  </div>

  <div id="toast">✅ 已获取色值</div>

  <script>
    const gruvboxCombos = [
      { name: "昏黄胶卷 (金典组合)", text: "昏黄胶卷", fill: "#fabd2f", stroke: "#7c6f64", width: 4 },
      { name: "暗室底片红", text: "相纸冲洗", fill: "#fb4934", stroke: "#282828", width: 4 },
      { name: "羊皮古籍卷", text: "历史厚重", fill: "#ebdbb2", stroke: "#504945", width: 5 },
      { name: "雨后薄荷青", text: "褪色青春", fill: "#8ec07c", stroke: "#3c3836", width: 4 },
      { name: "落日旧相册", text: "落日归途", fill: "#fe8019", stroke: "#282828", width: 4 },
      { name: "深水孤岛", text: "深蓝忧郁", fill: "#83a598", stroke: "#282828", width: 4 }
    ];

    const gruvboxData = {
      bg: [ { name: "极大极暗", hex: "#282828" }, { name: "暖灰过渡", hex: "#3c3836" }, { name: "浅灰大地", hex: "#504945" }, { name: "岩石灰", hex: "#665c54" }, { name: "泥土色", hex: "#7c6f64" } ],
      fg: [ { name: "高曝白", hex: "#fbf1c7" }, { name: "羊皮纸", hex: "#ebdbb2" }, { name: "做旧书页", hex: "#d5c4a1" }, { name: "糙纸白", hex: "#bdae93" }, { name: "泛黄灰白", hex: "#a89984" } ],
      normal: [ { name: "深邃红", hex: "#cc241d" }, { name: "黄昏橙", hex: "#d65d0e" }, { name: "暗金黄", hex: "#d79921" }, { name: "深苔绿", hex: "#98971a" }, { name: "灰湖蓝", hex: "#689d6a" }, { name: "做旧蓝", hex: "#458588" }, { name: "暗胶紫", hex: "#b16286" }, { name: "枯木灰", hex: "#928374" } ],
      bright: [ { name: "枯叶红", hex: "#fb4934" }, { name: "复古橙", hex: "#fe8019" }, { name: "路灯黄", hex: "#fabd2f" }, { name: "初春绿", hex: "#b8bb26" }, { name: "褪色青", hex: "#8ec07c" }, { name: "深水蓝", hex: "#83a598" }, { name: "紫罗兰", hex: "#d3869b" }, { name: "暖灰岩", hex: "#a89984" } ]
    };

    function renderCombos() {
      const grid = document.getElementById('grid-combo');
      gruvboxCombos.forEach(color => {
        const card = document.createElement('div');
        card.className = 'combo-card';
        card.innerHTML = `
          <div class="combo-demo">
            <div class="text-wrapper" style="--fill-color: ${color.fill}; --stroke-color: ${color.stroke}; --stroke-width: ${color.width*2}px;">
              <div class="demo-text" data-text="${color.text}">${color.text}</div>
            </div>
          </div>
          <div class="combo-action">
            <div class="combo-title">${color.name}</div>
            <div class="copy-group">
              <button class="copy-btn" onclick="execCopy('${color.fill}', '字色')"><span class="label">字色</span><span class="hex" style="color:${color.fill}">${color.fill}</span></button>
              <button class="copy-btn" onclick="execCopy('${color.stroke}', '边框')"><span class="label">边框</span><span class="hex" style="color:${color.stroke}">${color.stroke}</span></button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function renderSection(containerId, colorList) {
      const grid = document.getElementById(containerId);
      colorList.forEach(c => {
        const card = document.createElement('div');
        card.className = 'color-card';
        const isBright = colorList === gruvboxData.fg;
        card.innerHTML = `
          <div class="color-preview" style="background: ${c.hex}; color: ${isBright ? '#282828' : '#ebdbb2'}">复制该色</div>
          <div class="color-info"><span class="c-name">${c.name}</span><span class="c-hex">${c.hex}</span></div>
        `;
        card.onclick = () => execCopy(c.hex, c.name);
        grid.appendChild(card);
      });
    }

    renderCombos();
    renderSection('grid-bg', gruvboxData.bg);
    renderSection('grid-fg', gruvboxData.fg);
    renderSection('grid-normal', gruvboxData.normal);
    renderSection('grid-bright', gruvboxData.bright);

    let toastTimeout;
    window.execCopy = function(hex, typeName) {
      const cleanHex = hex.replace(/^#/, '');
      navigator.clipboard.writeText(cleanHex).then(() => {
        const toast = document.getElementById('toast');
        toast.innerHTML = `✅ 已完美提取 ${typeName}：<span style="monospace">${cleanHex}</span>`;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
      });
    };
  </script>
</body>
</html>
