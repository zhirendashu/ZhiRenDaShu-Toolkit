        let customUploadedSvgElement = null; 

        function showToast(msg) {
            const toast = document.getElementById("modern-toast");
            toast.innerText = msg; toast.classList.add("show");
            if(window.tt) clearTimeout(window.tt);
            window.tt = setTimeout(() => toast.classList.remove("show"), 3000);
        }

        function syncSliders() {
            document.getElementById('val-gen-count').innerText = document.getElementById('gen-count').value;
            const variance = document.getElementById('gen-variance').value;
            const varianceSpan = document.getElementById('val-gen-variance');
            varianceSpan.innerText = variance + '%';
            if (parseInt(variance) === 0) varianceSpan.style.color = '#fecdd3'; else varianceSpan.style.color = '#fff';

            document.getElementById('val-gen-scatter').innerText = document.getElementById('gen-scatter').value + '%';
            document.getElementById('val-gen-size').innerText = document.getElementById('gen-size').value;
        }

        function createBaseCutoutNode(sh, fakeColor) {
            let node;
            if(sh.isText) {
                node = new Konva.Text({
                    text: sh.str, fontSize: sh.sz, fontFamily: sh.fontFam, fontStyle: 'bold',
                    x: sh.x, y: sh.y, fill: fakeColor || 'black'
                });
                node.offsetX(node.width() / 2); node.offsetY(node.height() / 2);
            } else if (sh.type === 'custom_img' && customUploadedSvgElement) {
                const ratio = customUploadedSvgElement.width / customUploadedSvgElement.height;
                const width = ratio >= 1 ? sh.sz : sh.sz * ratio;
                const height = ratio < 1 ? sh.sz : sh.sz / ratio;
                node = new Konva.Image({
                    image: customUploadedSvgElement, x: sh.x, y: sh.y, width: width, height: height,
                    offsetX: width / 2, offsetY: height / 2
                });
            } else {
                node = new Konva.Path({
                    data: SVG_PATHS[sh.type] || SVG_PATHS['drop'],
                    x: sh.x, y: sh.y, fill: fakeColor || 'black', offsetX: 12, offsetY: 12,
                    scaleX: sh.sz / 24, scaleY: sh.sz / 24
                });
            }
            return node;
        }

        function rebuildMaskLayer() {
            if(!maskLayer) return;
            maskLayer.destroyChildren();

            const W = stage.width(), H = stage.height();
            const maskTop = H * (1 - config.coverage / 100);

            const bgRect = new Konva.Rect({
                x: 0, y: maskTop, width: W, height: H - maskTop,
                fill: makeHexColorAlpha(config.bgColor, config.bgOpacity),
                listening: false 
            });
            maskLayer.add(bgRect);

            cachedShapesData.forEach(sh => {
                const isUnderWall = sh.y >= maskTop;
                if(isUnderWall) {
                    const node = createBaseCutoutNode(sh, 'black');
                    node.globalCompositeOperation('destination-out');
                    node.listening(false);
                    maskLayer.add(node);
                }
            });
            maskLayer.batchDraw();
        }

        function rebuildUILayer() {
            if(!uiLayer) return;
            uiLayer.destroyChildren();

            const maskTop = stage.height() * (1 - config.coverage / 100);

            cachedShapesData.forEach(sh => {
                const isUnderWall = sh.y >= maskTop;
                const displayColor = isUnderWall ? 'rgba(0,0,0,0.01)' : config.fgColor;
                const node = createBaseCutoutNode(sh, displayColor);
                
                node.draggable(true);
                if (isUnderWall) {
                    node.opacity(0.01);
                } else {
                    node.opacity(1);
                    if (sh.type === 'custom_img') {
                         node.shadowColor('rgba(0,0,0,0.6)'); node.shadowBlur(15);
                    } else {
                         node.shadowColor(config.fgColor); node.shadowBlur(25);
                    }
                }

                node.on('dragmove', () => {
                    sh.x = node.x(); sh.y = node.y();
                    const newMaskTop = stage.height() * (1 - config.coverage / 100);
                    const nowUnderWall = sh.y >= newMaskTop;
                    
                    if(nowUnderWall) {
                        node.opacity(0.01); node.shadowBlur(0);
                    } else {
                        node.opacity(1); 
                        node.shadowBlur(sh.type === 'custom_img' ? 15 : 25);
                    }
                    rebuildMaskLayer();
                });

                node.on('dblclick dbltap', () => {
                    cachedShapesData = cachedShapesData.filter(item => item.id !== sh.id);
                    node.destroy();
                    rebuildMaskLayer(); 
                    uiLayer.batchDraw();
                });

                node.on('mouseenter', () => document.body.style.cursor = 'grab');
                node.on('mouseleave', () => document.body.style.cursor = 'default');
                node.on('mousedown', () => document.body.style.cursor = 'grabbing');
                node.on('mouseup', () => { document.body.style.cursor = 'grab'; rebuildMaskLayer(); });

                uiLayer.add(node);
            });
            uiLayer.batchDraw();
        }

        function recompileShapes() {
            if(!stage) return showToast("未检测到源文件，请先载入图片。");

            const W = stage.width(), H = stage.height();
            const count = parseInt(document.getElementById('gen-count').value);
            const variance = parseInt(document.getElementById('gen-variance').value) / 100;
            const scatter = parseInt(document.getElementById('gen-scatter').value) / 100;
            const basicSize = parseInt(document.getElementById('gen-size').value) / 100;
            const defS = (W*0.06) * basicSize;

            if (config.spAnchor === 'grid') {
                const effectiveW = W * 0.8 * scatter;
                const effectiveH = H * 0.8 * scatter;
                const startX = (W - effectiveW) / 2;
                const startY = (H - effectiveH) / 2;
                
                const ratio = effectiveW / effectiveH;
                let cols = Math.ceil(Math.sqrt(count * ratio));
                let rows = Math.ceil(count / cols);
                
                const stepX = effectiveW / Math.max(1, cols - 1);
                const stepY = effectiveH / Math.max(1, rows - 1);
                
                let drawn = 0;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (drawn >= count) break;
                        const sz = defS * (1 + (Math.random() * variance * 2 - variance));
                        cachedShapesData.push({ 
                            id: Math.random().toString(), type: config.spShape, 
                            x: startX + c * stepX, y: startY + r * stepY, sz: Math.max(10, Math.min(sz, 600)), isText:false 
                        });
                        drawn++;
                    }
                }
            } else {
                let bx1 = 0, bx2 = W, by1 = 0, by2 = H;
                if(config.spAnchor !== 'all' && config.spAnchor !== 'center') {
                    bx1 = config.spAnchor.includes('l') ? W*0.1 : W/2; bx2 = config.spAnchor.includes('l') ? W/2 : W*0.9;
                    by1 = config.spAnchor.includes('t') ? H*0.1 : H/2; by2 = config.spAnchor.includes('t') ? H/2 : H*0.9;
                } else if(config.spAnchor === 'center') {
                    bx1 = W*0.2; bx2 = W*0.8; by1 = H*0.2; by2 = H*0.8;
                }

                const cx = (bx1+bx2)/2; const cy = (by1+by2)/2;
                const rw = (bx2-bx1)/2 * scatter; const rh = (by2-by1)/2 * scatter;

                for(let i=0; i<count; i++) {
                    const rx = cx + (Math.random() * rw * 2 - rw);
                    const ry = cy + (Math.random() * rh * 2 - rh);
                    const sz = defS * (1 + (Math.random() * variance * 2 - variance));
                    cachedShapesData.push({ id: Math.random().toString(), type: config.spShape, x: rx, y: ry, sz: Math.max(10, Math.min(sz, 600)), isText:false });
                }
            }

            rebuildMaskLayer();
            rebuildUILayer();
        }

        function initApp() {
            document.querySelectorAll('input[type="range"].sys-slider').forEach(r => r.addEventListener('input', syncSliders));
            
            // 修复覆盖度滑块
            const covSlider = document.getElementById('layout-coverage');
            covSlider.addEventListener('input', (e) => {
                config.coverage = parseInt(e.target.value);
                document.getElementById('val-layout-cov').innerText = config.coverage + '%';
                rebuildMaskLayer();
                rebuildUILayer();
            });

            const cpBg = document.getElementById('color-picker-bg');
            const nBg = document.getElementById('native-bg-color');
            const nBgLabel = document.getElementById('custom-picker-bg-label');
            COLORS_BG.forEach(c => {
                const d = document.createElement('div'); d.className = 'color-dot' + (c===config.bgColor?' active':''); d.style.background = c;
                d.onclick = () => { 
                    cpBg.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('active')); nBgLabel.classList.remove('active');
                    d.classList.add('active'); config.bgColor = c; nBg.value = c; rebuildMaskLayer(); 
                }
                cpBg.insertBefore(d, nBgLabel);
            });
            nBg.onchange = (e) => {
                config.bgColor = e.target.value;
                cpBg.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('active'));
                nBgLabel.classList.add('active');
                rebuildMaskLayer();
            };

            const cpFg = document.getElementById('color-picker-fg');
            const nFg = document.getElementById('native-fg-color');
            const nFgLabel = document.getElementById('custom-picker-fg-label');
            COLORS_FG.forEach(c => {
                const d = document.createElement('div'); d.className = 'color-dot' + (c===config.fgColor?' active':''); d.style.background = c;
                d.onclick = () => { 
                    cpFg.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('active')); nFgLabel.classList.remove('active');
                    d.classList.add('active'); config.fgColor = c; nFg.value = c; rebuildUILayer(); 
                }
                cpFg.insertBefore(d, nFgLabel);
            });
            nFg.onchange = (e) => {
                config.fgColor = e.target.value;
                cpFg.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('active'));
                nFgLabel.classList.add('active');
                rebuildUILayer();
            };

            const dz = document.getElementById("drop-zone");
            const fi = document.getElementById("file-input");
            dz.onclick = e => { if(!stage && (e.target === dz || e.target.closest('#inner-drop-zone'))) fi.click(); };
            dz.ondblclick = e => { if(stage && e.target === dz) fi.click(); };
            fi.onchange = e => loadBaseImage(e.target.files[0]);
            dz.ondragover = dz.ondragenter = e => { e.preventDefault(); dz.classList.add("drag-active"); };
            dz.ondragleave = e => { if (e.clientX === 0 || e.clientY === 0) dz.classList.remove("drag-active"); };
            dz.ondrop = e => { e.preventDefault(); dz.classList.remove("drag-active"); loadBaseImage(e.dataTransfer.files[0]); };

            // 外部定制 SVG 图案装载仪
            document.getElementById('btn-upload-svg').onclick = () => { document.getElementById('svg-file-input').click(); };
            document.getElementById('svg-file-input').onchange = e => {
                const f = e.target.files[0];
                if(!f || !f.name.toLowerCase().endsWith('.svg')) return showToast("请务必传入有效且透明的 SVG 矢量图形！");
                
                const r = new FileReader();
                r.onload = ev => {
                    const tempIg = new Image();
                    tempIg.onload = () => {
                        customUploadedSvgElement = tempIg;
                        config.spShape = 'custom_img';
                        document.querySelectorAll('.shape-item').forEach(x=>x.classList.remove('active'));
                        document.getElementById('btn-upload-svg').classList.add('active');
                        document.getElementById('btn-upload-svg').style.borderColor = '#8b5cf6';
                        showToast("外部图形解析完毕，生成管线准备就绪。");
                    };
                    tempIg.src = ev.target.result;
                };
                r.readAsDataURL(f);
            };

            document.querySelectorAll('.shape-item:not(#btn-upload-svg)').forEach(b => {
                b.onclick = () => { 
                    document.querySelectorAll('.shape-item').forEach(x=>x.classList.remove('active')); 
                    b.classList.add('active'); config.spShape = b.dataset.shape; 
                    document.getElementById('btn-upload-svg').style.borderColor = '';
                }
            });
            document.querySelectorAll('.pos-btn').forEach(b => {
                b.onclick = () => { document.querySelectorAll('.pos-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); config.spAnchor = b.dataset.pos; }
            });

            // 【主生成按钮：每次生成前先清掉老数据（回归核心逻辑）】
            document.getElementById('btn-fire-pattern').onclick = () => { 
                cachedShapesData = []; // 重置清理
                recompileShapes(); 
                showToast("全新视觉混合矩阵就绪");
            };
            
            // 【附加生成按钮：在原有的基础上增加（堆叠逻辑）】
            document.getElementById('btn-append-pattern').onclick = () => { 
                recompileShapes(); 
                showToast("✅ 已成功向图层追加叠加了新元素集！");
            };

            // 系统字体读取引擎
            document.getElementById('btn-scan-fonts').onclick = async () => {
                try {
                    if ('queryLocalFonts' in window) {
                        const fonts = await window.queryLocalFonts();
                        const familySet = new Set();
                        fonts.forEach(f => familySet.add(f.family));
                        const sel = document.getElementById('text-font-selector');
                        const g = document.createElement('optgroup');
                        g.label = "-- 本机系统授权字库 --";
                        Array.from(familySet).slice(0, 150).forEach(fam => {
                            const op = document.createElement('option');
                            op.value = `"${fam}", sans-serif`; op.innerText = fam;
                            g.appendChild(op);
                        });
                        sel.appendChild(g);
                        showToast("字库挂载成功：已捕获系统本地字体资源。");
                    } else {
                        throw new Error('Not supported');
                    }
                } catch(err) {
                    showToast("环境鉴权拒绝限制，已退回至跨平台安全字体库。");
                    const common = [{n:'微软雅黑',v:'"Microsoft YaHei"'},{n:'楷体',v:'"KaiTi"'},{n:'Impact (无衬线)',v:'Impact'},{n:'黑体 标准',v:'SimHei'}];
                    const g = document.createElement('optgroup'); g.label = "-- 安全系统备选字 --";
                    common.forEach(f => {
                        const op = document.createElement('option');
                        op.value = f.v; op.innerText = f.n; g.appendChild(op);
                    });
                    document.getElementById('text-font-selector').appendChild(g);
                }
            };

            document.getElementById('custom-text-input').onkeydown = e => { if(e.key==='Enter') document.getElementById('btn-add-custom-text').click(); }
            document.getElementById('btn-add-custom-text').onclick = () => {
                if(!stage) return showToast("请优先装载承载图像。");
                const i = document.getElementById('custom-text-input');
                if(!i.value) return showToast("无法传入空字段。");
                const fFam = document.getElementById('text-font-selector').value;
                cachedShapesData.push({ id: Math.random().toString(), isText: true, str: i.value.trim(), fontFam: fFam, x: stage.width()/2, y: stage.height()/2, sz: 65 });
                i.value = ''; rebuildMaskLayer(); rebuildUILayer();
            };

            document.getElementById('btn-export').onclick = () => {
                if(!stage) return showToast("渲染管线中无有效媒体文件。");
                const dataURL = stage.toDataURL({ pixelRatio: 2 });
                const lnk = document.createElement('a'); lnk.download = `MediaWorkspace_${Date.now()}.png`;
                lnk.href = dataURL; lnk.click();
            };
        }

        function loadBaseImage(f) {
            if(!f || !f.type.startsWith("image/")) return showToast("不支持的文件解析格式。");
            
            const r = new FileReader();
            r.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    const dz = document.getElementById("drop-zone");
                    const mW = dz.clientWidth * 0.95, mH = dz.clientHeight * 0.95;
                    const ratio = img.width / img.height;
                    let tW = mW, tH = tW / ratio;
                    if (tH > mH) { tH = mH; tW = tH * ratio; }

                    document.getElementById("inner-drop-zone").style.display = 'none';

                    if(!stage) {
                        stage = new Konva.Stage({ container: 'canvas-container', width: tW, height: tH });
                        photoLayer = new Konva.Layer();
                        maskLayer = new Konva.Layer();
                        uiLayer = new Konva.Layer();
                        stage.add(photoLayer);
                        stage.add(maskLayer);
                        stage.add(uiLayer);
                    } else {
                        stage.width(tW); stage.height(tH);
                        photoLayer.destroyChildren();
                    }

                    const bgPhoto = new Konva.Image({ x: 0, y: 0, image: img, width: tW, height: tH, listening: false });
                    photoLayer.add(bgPhoto);
                    photoLayer.batchDraw();

                    cachedShapesData = [];
                    rebuildMaskLayer(); rebuildUILayer();
                };
                img.src = ev.target.result;
            };
            r.readAsDataURL(f);
        }

        document.addEventListener('click', (e) => {
            const wrap = e.target.closest('.color-picker-wrapper');
            if (wrap) {
                wrap.querySelector('input[type="color"]').click();
            }
        });

        document.addEventListener('DOMContentLoaded', initApp);
    </script>

<style>
#modern-toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(22, 26, 36, 0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #fff;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 600;
    z-index: 100000;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 8px;
}
#modern-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>
<div id="modern-toast"></div>
<script>
(function() {
    // 1. Alert Override with Modern Toast
    window.showToast = function(msg, type="info") {
        const toast = document.getElementById("modern-toast");
        if (!toast) return;
        const icon = type === 'error' ? '❌' : (type === 'success' ? '✅' : '✨');
        toast.innerHTML = `${icon} <span style="margin-left:4px;">${msg}</span>`;
        toast.classList.add("show");
        if(window._toastTimer) clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => toast.classList.remove("show"), 3000);
    };
    window.alert = function(msg) {
        window.showToast(msg, 'error');
    };

    // 2. Double-Click Range Reset
    function initRangeResets() {
        document.querySelectorAll('input[type="range"]').forEach(slider => {
            if (slider._hasDblclickReset) return;
            slider._hasDblclickReset = true;
            const defVal = slider.getAttribute('value') || slider.value || '0';
            slider.addEventListener('dblclick', () => {
                slider.value = defVal;
                slider.dispatchEvent(new Event('input', { bubbles: true }));
                slider.dispatchEvent(new Event('change', { bubbles: true }));
            });
        });
    }

    // 3. Eyedropper API integration for color inputs
    function initEyedropper() {
        if (!window.EyeDropper) return;
        document.querySelectorAll('input[type="color"]').forEach(colorInput => {
            if (colorInput.dataset.hasEyedropper) return;
            colorInput.dataset.hasEyedropper = "true";
            
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.innerHTML = '🎨';
            btn.title = '屏幕吸色';
            btn.style.marginLeft = '6px';
            btn.style.padding = '4px 6px';
            btn.style.background = 'rgba(255,255,255,0.06)';
            btn.style.border = '1px solid rgba(255,255,255,0.1)';
            btn.style.borderRadius = '6px';
            btn.style.color = '#fff';
            btn.style.cursor = 'pointer';
            btn.style.fontSize = '0.75rem';
            btn.style.display = 'inline-flex';
            btn.style.alignItems = 'center';
            btn.style.justifyContent = 'center';
            btn.style.height = '28px';
            btn.style.transition = '0.2s';
            btn.style.verticalAlign = 'middle';
            
            btn.onmouseover = () => btn.style.background = 'rgba(255,255,255,0.12)';
            btn.onmouseout = () => btn.style.background = 'rgba(255,255,255,0.06)';
            
            if (colorInput.nextSibling) {
                colorInput.parentNode.insertBefore(btn, colorInput.nextSibling);
            } else {
                colorInput.parentNode.appendChild(btn);
            }
            
            btn.onclick = async (e) => {
                e.preventDefault();
                try {
                    const dropper = new EyeDropper();
                    const result = await dropper.open();
                    colorInput.value = result.sRGBHex;
                    colorInput.dispatchEvent(new Event('input', { bubbles: true }));
                    colorInput.dispatchEvent(new Event('change', { bubbles: true }));
                } catch(err) {}
            };
        });
    }

    // Initialize all components
    function initAll() {
        initRangeResets();
        initEyedropper();
    }
    
    document.addEventListener("DOMContentLoaded", initAll);
    if (document.readyState === "interactive" || document.readyState === "complete") {
        initAll();
    }
})();
</script>
<!-- Unified Premium UX End -->
