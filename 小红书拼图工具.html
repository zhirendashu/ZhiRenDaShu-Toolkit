            background: rgba(0,0,0,0.8);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-size: 1.2rem;
            backdrop-filter: blur(5px);

            width: 40px; height: 40px;

        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        @media (max-width: 768px) {
            body { height: auto; min-height: 100dvh; overflow-y: auto; }

            header { padding: 12px 16px; }
            h1 { font-size: 1rem; white-space: normal; }

            /* 主容器竖向堆叠 */
            .main-container {
                flex-direction: column;
                padding: 12px;
                gap: 12px;
                min-height: unset;
            }

            /* 预览区固定高度 */
            .preview-area {
                flex: none;
                height: 45vh;

            /* 侧边栏变全宽底部面板 */
            .sidebar {
                width: 100%;
                padding-right: 0;
                overflow-y: visible;
            }
        }
    



/* ==================== Unified Canvas & Workspace Design System ==================== */

select:focus, input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
    border-color: #6366f1 !important;

</style>
</head>

    <script>
        const BridgeDB = {
            name: 'ZhiRenDaShu_Bridge',
            store: 'image_transfer',
            async save(images) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(this.store, 'readwrite');
                    const s = tx.objectStore(this.store);
                    s.clear();
                    
                    let count = 0;
                    if(images.length === 0) return resolve();
                    images.forEach(img => {
                        const req = s.add(img);
                        req.onsuccess = () => {
                            count++;
                            if (count === images.length) resolve();
                        };
                        req.onerror = e => reject(e);
                    });
                });
            },
            open() {
                return new Promise((res) => {
                    const req = indexedDB.open(this.name, 1);
                    req.onupgradeneeded = () => {
                        req.result.createObjectStore(this.store, { autoIncrement: true });
                    };
                    req.onsuccess = () => res(req.result);
                });
            }
        };
    </script>

        function handleFiles(files) {
            const imgs = files.filter(f => f.type.startsWith("image/"));
            if(!imgs.length) return;
            showLoad("处理图片中...");

            imgs.forEach(file => {

        function renderQueue() {
            const q = document.getElementById("queue-list");

        window.delImg = function(index) {
            sourceImages.splice(index, 1);
            renderQueue();
            triggerRender();
        }

        // === Canvas 交互：拖拽与滚轮缩放 ===
        let hitboxes = [];

        cvs.addEventListener("pointermove", e => {
            if (isDragging || isDraggingSplit || !sourceImages.length) return;
            const rect = cvs.getBoundingClientRect();
            const scaleX = cvs.width / rect.width;
            const scaleY = cvs.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;
            
            let found = null;
            const HIT_DIST = 40; 
            for (let line of splitLines) {
                if (line.type === 'h') {
                    if (Math.abs(my - line.y) < HIT_DIST && mx >= line.x1 && mx <= line.x2) { found = line; break; }
                } else if (line.type === 'v') {
                    if (Math.abs(mx - line.x) < HIT_DIST && my >= line.y1 && my <= line.y2) { found = line; break; }
                } else if (line.type === 'skew') {
                    let lineYatX = line.yCenter - line.dx + (mx / cvs.width) * (2 * line.dx);
                    if (Math.abs(my - lineYatX) < HIT_DIST) { found = line; break; }
                }
            }
            
            if (found) {
                if (hoverSplitKey !== found.key) {
                    hoverSplitKey = found.key;
                    if (found.type === 'v') cvs.style.cursor = 'col-resize';
                    else if (found.type === 'h') cvs.style.cursor = 'row-resize';
                    else cvs.style.cursor = 'ns-resize';
                    triggerRender();
                }
            } else if (hoverSplitKey) {
                hoverSplitKey = null;
                cvs.style.cursor = 'default';
                triggerRender();
            }
        });

        cvs.addEventListener("pointerdown", e => {
            if(!sourceImages.length) return;
            const rect = cvs.getBoundingClientRect();
            const scaleX = cvs.width / rect.width;
            const scaleY = cvs.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;

            if (hoverSplitKey) {
                isDraggingSplit = true;
                dragSplitKey = hoverSplitKey;
                return;
            }

            for(let i=hitboxes.length-1; i>=0; i--) {
                const box = hitboxes[i];
                if(mx >= box.x && mx <= box.x+box.w && my >= box.y && my <= box.y+box.h) {
                    isDragging = true;
                    dragIndex = box.index;
                    startX = mx;
                    startY = my;
                    cvs.style.cursor = "grabbing";
                    return;
                }
            }
        });

        window.addEventListener("pointermove", e => {
            const rect = cvs.getBoundingClientRect();
            const scaleX = cvs.width / rect.width;
            const scaleY = cvs.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;

            if (isDraggingSplit) {
                const W = cvs.width;
                const H = cvs.height;
                const padEl = document.getElementById("param-pad");
                const pad = padEl ? parseInt(padEl.value) : 0;
                let newRatio;
                
                if (dragSplitKey === 'grid2' || dragSplitKey === 'grid3_y') {
                    newRatio = (my - pad) / (H - pad*2);
                } else if (dragSplitKey === 'grid3_x') {
                    newRatio = (mx - pad) / (W - pad*2);
                } else if (dragSplitKey.startsWith('skew')) {
                    const line = splitLines.find(l => l.key === dragSplitKey);
                    const dx = line ? line.dx : (H * Math.tan(parseInt(document.getElementById("param-angle").value) * Math.PI / 180));
                    let newCenterY = my + dx - (mx / W) * (2 * dx);
                    newRatio = newCenterY / H;
                }
                
                newRatio = Math.max(0.1, Math.min(0.9, newRatio));
                if (dragSplitKey === 'skew3_1') newRatio = Math.min(newRatio, splitRatios.skew3_2 - 0.1);
                if (dragSplitKey === 'skew3_2') newRatio = Math.max(newRatio, splitRatios.skew3_1 + 0.1);

                splitRatios[dragSplitKey] = newRatio;
                triggerRender();
                return;
            }

            if(!isDragging || dragIndex === -1) return;

            const dx = mx - startX;
            const dy = my - startY;
            
            const item = sourceImages[dragIndex];
            const activeImg = item.bgRemovedImg || item.img;
            
            // 计算位移比例，用于归一化
            const refW = activeImg.width;
            const refH = activeImg.height;
            
            item.sx -= (dx / cvs.width) * refW * 2;
            item.sy -= (dy / cvs.height) * refH * 2;

            startX = mx;
            startY = my;
            triggerRender();
        });

        window.addEventListener("pointerup", () => {
            isDragging = false;
            isDraggingSplit = false;
            dragSplitKey = null;
            dragIndex = -1;
            if (!hoverSplitKey) cvs.style.cursor = "default";
            triggerRender();
        });

        // 滚轮缩放
        cvs.addEventListener("wheel", e => {
            e.preventDefault();
            if(!sourceImages.length) return;
            const rect = cvs.getBoundingClientRect();
            const scaleX = cvs.width / rect.width;
            const scaleY = cvs.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;

            let hit = -1;
            for(let i=hitboxes.length-1; i>=0; i--) {
                const box = hitboxes[i];
                if(mx >= box.x && mx <= box.x+box.w && my >= box.y && my <= box.y+box.h) {
                    hit = box.index; break;
                }
            }
            if(hit === -1) return;

            const item = sourceImages[hit];
            const delta = e.deltaY > 0 ? 0.94 : 1.06;
            item.scale = Math.max(0.5, Math.min(4.0, item.scale * delta));
            triggerRender();
        }, { passive: false });


        // === 核心渲染逻辑 ===
        function triggerRender() {
            if(renderTimer) clearTimeout(renderTimer);
            renderTimer = setTimeout(render, 30);
        }

        function drawCover(ctx, item, x, y, rw, rh) {
            const img = item.bgRemovedImg || item.img;
            const scale = item.scale;
            const imgRatio = img.width / img.height;
            const boxRatio = rw / rh;
            
            let sw, sh;
            // Cover 计算
            if(imgRatio > boxRatio) {
                sh = img.height / scale;
                sw = sh * boxRatio;
            } else {
                sw = img.width / scale;
                sh = sw / boxRatio;
            }

            // 限制拖拽偏移
            let sx = (img.width - sw) / 2 + item.sx;
            let sy = (img.height - sh) / 2 + item.sy;
            
            // 边缘保护（避免黑边）
            ux = Math.max(0, Math.min(img.width - sw, sx));
            uy = Math.max(0, Math.min(img.height - sh, sy));
            // 写回修正后的值
            item.sx = ux - (img.width - sw)/2;
            item.sy = uy - (img.height - sh)/2;

            const radiusEl = document.getElementById("param-radius");
            const r = radiusEl ? parseInt(radiusEl.value) : 0;
            
            if(r > 0 && typeof ctx.roundRect === 'function') {
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(x, y, rw, rh, r);
                ctx.clip();
                ctx.drawImage(img, ux, uy, sw, sh, x, y, rw, rh);
                ctx.restore();
            } else {
                ctx.drawImage(img, ux, uy, sw, sh, x, y, rw, rh);
            }

            hitboxes.push({ index: sourceImages.indexOf(item), x, y, w: rw, h: rh });

            // 选中框反馈
            if(isDragging && dragIndex === sourceImages.indexOf(item)) {
                ctx.save();
                ctx.beginPath();
                if(r > 0 && typeof ctx.roundRect === 'function') {
                    ctx.roundRect(x+2, y+2, rw-4, rh-4, r);
                } else {
                    ctx.rect(x+2, y+2, rw-4, rh-4);
                }
                ctx.fillStyle = "rgba(255, 36, 66, 0.15)";
                ctx.fill();
                ctx.strokeStyle = "#ff2442";
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.restore();
            }
        }

        function fillBackgroundFn(ocx, w, h, bgColor) {
            if(customBgImg) {
                const imgRatio = customBgImg.width / customBgImg.height;
                const boxRatio = w / h;
                let sw, sh;
                if(imgRatio > boxRatio) {
                    sh = customBgImg.height;
                    sw = sh * boxRatio;
                } else {
                    sw = customBgImg.width;
                    sh = sw / boxRatio;
                }
                const sx = (customBgImg.width - sw) / 2;
                const sy = (customBgImg.height - sh) / 2;
                ocx.drawImage(customBgImg, sx, sy, sw, sh, 0, 0, w, h);
            } else {
                ocx.fillStyle = bgColor || "#ffffff";
                ocx.fillRect(0,0,w,h);
            }
        }

        function drawRetroBorder(ctx, W, H, style, color, outerW, gapW, innerW, radius) {
            if (!style || style === 'none') return;
            
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            
            if (style === 'single' || style === 'double') {
                const halfOuter = outerW / 2;
                ctx.lineWidth = outerW;
                ctx.beginPath();
                if (typeof ctx.roundRect === 'function') {
                    ctx.roundRect(halfOuter, halfOuter, W - outerW, H - outerW, radius);
                } else {
                    ctx.rect(halfOuter, halfOuter, W - outerW, H - outerW);
                }
                ctx.stroke();
            }
            
            if (style === 'double') {
                const offset = outerW + gapW + innerW / 2;
                const innerRadius = Math.max(0, radius - outerW - gapW);
                ctx.lineWidth = innerW;
                ctx.beginPath();
                if (typeof ctx.roundRect === 'function') {
                    ctx.roundRect(offset, offset, W - offset * 2, H - offset * 2, innerRadius);
                } else {
                    ctx.rect(offset, offset, W - offset * 2, H - offset * 2);
                }
                ctx.stroke();
            }
            
            ctx.restore();
        }

        function render() {
            if(!sourceImages.length) return;
            hitboxes = [];
            splitLines = [];
            const W = getOutConfig().w;
            
            const ratioSelect = document.getElementById("param-ratio");
            const ratio = ratioSelect ? parseFloat(ratioSelect.value) : 0.75;
            let H = W / ratio;

            // 获取复古边框设置
            const borderStyle = document.getElementById("param-border-style") ? document.getElementById("param-border-style").value : 'none';
            const borderColor = document.getElementById("param-border-color") ? document.getElementById("param-border-color").value : '#ff5a1f';
            const outerW = document.getElementById("param-border-outer") ? parseInt(document.getElementById("param-border-outer").value) : 28;
            const gapW = document.getElementById("param-border-gap") ? parseInt(document.getElementById("param-border-gap").value) : 16;
            const innerW = document.getElementById("param-border-inner") ? parseInt(document.getElementById("param-border-inner").value) : 3;
            const borderRadiusVal = document.getElementById("param-border-radius") ? parseInt(document.getElementById("param-border-radius").value) : 32;

            // 计算包含边框后的有效内边距
            const padEl = document.getElementById("param-pad");
            const pad = padEl ? parseInt(padEl.value) : 0;
            const borderOverlaySelect = document.getElementById("param-border-overlay");
            const borderOverlay = borderOverlaySelect ? (borderOverlaySelect.value === 'true') : false;
            let effPad = pad;
            if (borderStyle !== 'none') {
                if (borderOverlay) {
                    effPad = Math.max(pad, outerW);
                } else {
                    if (borderStyle === 'single') {
                        effPad = Math.max(pad, outerW + 10);
                    } else if (borderStyle === 'double') {
                        effPad = Math.max(pad, outerW + gapW + innerW + 15);
                    }
                }
            }

            // 创建离屏 Canvas
            const off = document.createElement("canvas");
            const ocx = off.getContext("2d");

            if(currentMode === "grid") {
                const gap = parseInt(document.getElementById("param-gap").value);
                const bgEl = document.getElementById("param-bg");
                const bg = bgEl ? bgEl.value : "#ffffff";
                off.width = W; off.height = H;
                fillBackgroundFn(ocx, W, H, bg);
                
                const len = sourceImages.length;
                if (len === 1) {
                    drawCover(ocx, sourceImages[0], effPad, effPad, W - effPad*2, H - effPad*2);
                } else if (len === 2) {
                    const innerH = H - effPad*2;
                    const cw = W - effPad*2;
                    const row1_H = (innerH - gap) * splitRatios.grid2;
                    const row2_H = (innerH - gap) - row1_H;
                    drawCover(ocx, sourceImages[0], effPad, effPad, cw, row1_H);
                    drawCover(ocx, sourceImages[1], effPad, effPad + row1_H + gap, cw, row2_H);
                    splitLines.push({ type: 'h', key: 'grid2', y: effPad + row1_H + gap/2, x1: effPad, x2: effPad+cw });
                } else if (len === 3) {
                    const cw = W - effPad*2;
                    const innerH = H - effPad*2;
                    const row1_H = (innerH - gap) * splitRatios.grid3_y;
                    const row2_H = (innerH - gap) - row1_H;
                    const col1_W = (cw - gap) * splitRatios.grid3_x;
                    const col2_W = (cw - gap) - col1_W;
                    drawCover(ocx, sourceImages[0], effPad, effPad, cw, row1_H);
                    drawCover(ocx, sourceImages[1], effPad, effPad + row1_H + gap, col1_W, row2_H);
                    drawCover(ocx, sourceImages[2], effPad + col1_W + gap, effPad + row1_H + gap, col2_W, row2_H);
                    splitLines.push({ type: 'h', key: 'grid3_y', y: effPad + row1_H + gap/2, x1: effPad, x2: effPad+cw });
                    splitLines.push({ type: 'v', key: 'grid3_x', x: effPad + col1_W + gap/2, y1: effPad + row1_H + gap, y2: effPad+innerH });
                } else {
                    let cols = 2, rows = 2;
                    if(len<=4) { cols=2; rows=2; }
                    else if(len<=6) { cols=3; rows=2; }
                    else { cols=3; rows=3; }
                    
                    const cellW = (W - gap*(cols-1) - effPad*2) / cols;
                    const cellH = (H - gap*(rows-1) - effPad*2) / rows;

                    sourceImages.forEach((item, i) => {
                        if(i >= cols*rows) return;
                        const c = i % cols;
                        const r = Math.floor(i / cols);
                        drawCover(ocx, item, effPad + c*(cellW+gap), effPad + r*(cellH+gap), cellW, cellH);
                    });
                }

            } else if(currentMode === "long") {
                const gap = parseInt(document.getElementById("param-gap").value);
                const bgEl = document.getElementById("param-bg");
                const bg = bgEl ? bgEl.value : "#ffffff";
                const innerW = W - effPad*2;
                
                let totalH = effPad * 2;
                sourceImages.forEach(item => {
                    const img = item.bgRemovedImg || item.img;
                    totalH += innerW / (img.width / img.height);
                });
                totalH += gap * (sourceImages.length - 1);
                
                off.width = W; off.height = Math.round(totalH);
                fillBackgroundFn(ocx, off.width, off.height, bg);
                
                let cy = effPad;
                sourceImages.forEach(item => {
                    const img = item.bgRemovedImg || item.img;
                    const ch = innerW / (img.width / img.height);
                    drawCover(ocx, item, effPad, cy, innerW, ch);
                    cy += ch + gap;
                });

            } else if(currentMode === "frame") {
                const bgEl = document.getElementById("param-bg");
                const bg = bgEl ? bgEl.value : "#ffffff";
                const tc = document.getElementById("param-color").value;
                const txt = document.getElementById("param-text").value;
                
                off.width = W; off.height = H;
                fillBackgroundFn(ocx, W, H, bg);
                
                const fSpace = H * 0.15;
                const cw = W - effPad*2;
                const ch = H - effPad - fSpace;
                
                const gap = 30;
                const sh = (ch - gap*(sourceImages.length-1)) / sourceImages.length;
                let cy = effPad;
                sourceImages.forEach(item => {
                    drawCover(ocx, item, effPad, cy, cw, sh);
                    cy += sh + gap;
                });

                if(txt) {
                    ocx.fillStyle = tc;
                    ocx.textAlign = "center";
                    ocx.textBaseline = "middle";
                    ocx.font = `600 ${W*0.03}px var(--font-display)`;
                    ocx.fillText(txt, W/2, H - fSpace/2);
                }

            } else if(currentMode === "skew") {
                const angle = parseInt(document.getElementById("param-angle").value) * Math.PI / 180;
                const bgEl = document.getElementById("param-bg");
                const bg = bgEl ? bgEl.value : "#ffffff";
                off.width = W; off.height = H;
                fillBackgroundFn(ocx, W, H, bg);
                
                const len = sourceImages.length;
                const innerW = W - effPad*2;
                const innerH = H - effPad*2;
                if(len===1 || len>3) {
                    drawCover(ocx, sourceImages[0], effPad, effPad, innerW, innerH);
                } else {
                    const dx = innerH * Math.tan(angle);
                    if(len===2) {
                        const splitY = innerH * splitRatios.skew2;
                        ocx.save(); ocx.beginPath(); 
                        ocx.moveTo(effPad, effPad); 
                        ocx.lineTo(W - effPad, effPad); 
                        ocx.lineTo(W - effPad, effPad + splitY + dx); 
                        ocx.lineTo(effPad, effPad + splitY - dx); 
                        ocx.clip();
                        drawCover(ocx, sourceImages[0], effPad, effPad, innerW, splitY + dx); ocx.restore();
                        
                        ocx.save(); ocx.beginPath(); 
                        ocx.moveTo(effPad, effPad + splitY - dx); 
                        ocx.lineTo(W - effPad, effPad + splitY + dx); 
                        ocx.lineTo(W - effPad, H - effPad); 
                        ocx.lineTo(effPad, H - effPad); 
                        ocx.clip();
                        drawCover(ocx, sourceImages[1], effPad, effPad + splitY - dx, innerW, innerH - (splitY - dx)); ocx.restore();
                        
                        ocx.lineWidth = 14; ocx.strokeStyle=bg;
                        ocx.beginPath(); ocx.moveTo(effPad, effPad + splitY - dx); ocx.lineTo(W - effPad, effPad + splitY + dx); ocx.stroke();
                        splitLines.push({ type: 'skew', key: 'skew2', yCenter: effPad + splitY, dx: dx, x1: effPad, x2: W - effPad });
                    } else if(len===3) {
                        const splitY1 = innerH * splitRatios.skew3_1;
                        const splitY2 = innerH * splitRatios.skew3_2;
                        
                        ocx.save(); ocx.beginPath(); 
                        ocx.moveTo(effPad, effPad); 
                        ocx.lineTo(W - effPad, effPad); 
                        ocx.lineTo(W - effPad, effPad + splitY1 + dx); 
                        ocx.lineTo(effPad, effPad + splitY1 - dx); 
                        ocx.clip();
                        drawCover(ocx, sourceImages[0], effPad, effPad, innerW, splitY1 + dx); ocx.restore();
                        
                        ocx.save(); ocx.beginPath(); 
                        ocx.moveTo(effPad, effPad + splitY1 - dx); 
                        ocx.lineTo(W - effPad, effPad + splitY1 + dx); 
                        ocx.lineTo(W - effPad, effPad + splitY2 + dx); 
                        ocx.lineTo(effPad, effPad + splitY2 - dx); 
                        ocx.clip();
                        drawCover(ocx, sourceImages[1], effPad, effPad + splitY1 - dx, innerW, (splitY2+dx) - (splitY1-dx)); ocx.restore();
                        
                        ocx.save(); ocx.beginPath(); 
                        ocx.moveTo(effPad, effPad + splitY2 - dx); 
                        ocx.lineTo(W - effPad, effPad + splitY2 + dx); 
                        ocx.lineTo(W - effPad, H - effPad); 
                        ocx.lineTo(effPad, H - effPad); 
                        ocx.clip();
                        drawCover(ocx, sourceImages[2], effPad, effPad + splitY2 - dx, innerW, innerH - (splitY2 - dx)); ocx.restore();
 
                        ocx.lineWidth = 14; ocx.strokeStyle=bg;
                        ocx.beginPath(); ocx.moveTo(effPad, effPad + splitY1 - dx); ocx.lineTo(W - effPad, effPad + splitY1 + dx); ocx.stroke();
                        ocx.beginPath(); ocx.moveTo(effPad, effPad + splitY2 - dx); ocx.lineTo(W - effPad, effPad + splitY2 + dx); ocx.stroke();
                        splitLines.push({ type: 'skew', key: 'skew3_1', yCenter: effPad + splitY1, dx: dx, x1: effPad, x2: W - effPad });
                        splitLines.push({ type: 'skew', key: 'skew3_2', yCenter: effPad + splitY2, dx: dx, x1: effPad, x2: W - effPad });
                    }
                }
            } else if(currentMode === "pip") {
                const blur = parseInt(document.getElementById("param-blur").value);
                const innerScale = parseInt(document.getElementById("param-inner-scale").value) / 100;
                const innerRatioSelect = document.getElementById("param-inner-ratio");
                const innerRatio = innerRatioSelect ? parseFloat(innerRatioSelect.value) : 1.333;

                off.width = W; off.height = H;
                
                const bgItem = sourceImages[0];
                if(blur > 0) {
                    ocx.filter = `blur(${blur}px) brightness(0.85)`;
                }
                const bExp = blur * 2;
                drawCover(ocx, bgItem, -bExp, -bExp, W + bExp*2, H + bExp*2);
                ocx.filter = "none";
                
                if (innerScale > 0) {
                    const fgItem = sourceImages.length > 1 ? sourceImages[1] : sourceImages[0];
                    
                    let maxInnerW = W * 0.95; 
                    let maxInnerH = H * 0.95;
                    
                    let innerW = maxInnerW * innerScale;
                    let innerH = innerW / innerRatio;
                    if (innerH > maxInnerH * innerScale) {
                        innerH = maxInnerH * innerScale;
                        innerW = innerH * innerRatio;
                    }
                    
                    const ix = (W - innerW) / 2;
                    const iy = (H - innerH) / 2;
                    
                    ocx.shadowColor = "rgba(0,0,0,0.6)";
                    ocx.shadowBlur = W * 0.02;     
                    ocx.shadowOffsetY = W * 0.01;  
                    
                    drawCover(ocx, fgItem, ix, iy, innerW, innerH);
                    
                    ocx.shadowColor = "transparent";
                    ocx.shadowBlur = 0;
                    ocx.shadowOffsetY = 0;
                }
            }

            if (hoverSplitKey || isDraggingSplit) {
                const activeKey = isDraggingSplit ? dragSplitKey : hoverSplitKey;
                const line = splitLines.find(l => l.key === activeKey);
                if (line) {
                    ocx.save();
                    ocx.strokeStyle = "rgba(99, 102, 241, 0.9)";
                    ocx.lineWidth = 8;
                    ocx.lineCap = "round";
                    ocx.beginPath();
                    if (line.type === 'h') {
                        ocx.moveTo(line.x1, line.y); ocx.lineTo(line.x2, line.y);
                    } else if (line.type === 'v') {
                        ocx.moveTo(line.x, line.y1); ocx.lineTo(line.x, line.y2);
                    } else if (line.type === 'skew') {
                        ocx.moveTo(effPad, line.yCenter - line.dx); ocx.lineTo(line.x2, line.yCenter + line.dx);
                    }
                    ocx.stroke();
                    ocx.restore();
                }
            }

            // 在最上层叠加绘制复古边框
            drawRetroBorder(ocx, off.width, off.height, borderStyle, borderColor, outerW, gapW, innerW, borderRadiusVal);

            cvs.width = off.width;
            cvs.height = off.height;
            ctx.drawImage(off, 0, 0);
            finalCanvasCache = off;
        }

        // === 辅助 ===
        function showLoad(text) { loadText.innerText = text; loading.style.display="flex"; }
        function hideLoad() { loading.style.display="none"; }

        // === 导出 ===
        document.getElementById("download-btn").addEventListener("click", () => {
            if(!finalCanvasCache) return alert("空画布");
            showLoad("处理高清图片...");
            const conf = getOutConfig();
            setTimeout(() => {
                finalCanvasCache.toBlob(blob => {
                    const ext = conf.fmt === 'image/png' ? 'png' : 'jpg';
                    saveAs(blob, `植人大树拼图_${Date.now()}.${ext}`);
                    hideLoad();
                }, conf.fmt, conf.q);
            }, 100);
        });

        document.getElementById("transfer-btn").addEventListener("click", async () => {
            if(!finalCanvasCache) return;
            showLoad("打包传送中...");
            const blob = await new Promise(r => finalCanvasCache.toBlob(r, 'image/png'));
            await BridgeDB.save([{ name: `合成_${Date.now()}.png`, blob }]);
            window.location.href = "封面比例转换工具.html?from=bridge";
        });

        document.getElementById("refine-btn").addEventListener("click", async () => {
            if(!finalCanvasCache) return;
            showLoad("打包传送中...");
            const blob = await new Promise(r => finalCanvasCache.toBlob(r, 'image/png'));
            await BridgeDB.save([{ name: `合成_${Date.now()}.png`, blob }]);
            window.location.href = "封面精修大师.html?from=bridge";
        });

        // 自定义背景图片上传逻辑
        const bgFileInput = document.getElementById('bg-file-input');
        if (bgFileInput) {
            bgFileInput.addEventListener('change', e => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = f => {
                    const img = new Image();
                    img.onload = () => {
                        customBgImg = img;
                        const clearBtn = document.getElementById("param-bg-img-clear");
                        if(clearBtn) clearBtn.style.display = "block";
                        triggerRender();
                    };
                    img.src = f.target.result;
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            });
        }

        // === 模板功能 ===
        const saveTplBtn = document.getElementById("save-tpl-btn");
        if(saveTplBtn) {
            saveTplBtn.addEventListener("click", () => {
                const config = {
                    mode: currentMode,
                    params: {}
                };
                document.querySelectorAll('#settings-panel input, #settings-panel select, #border-panel input, #border-panel select').forEach(el => {
                    if(el.id && el.type !== 'file') {
                        config.params[el.id] = el.type === 'checkbox' ? el.checked : el.value;
                    }
                });
                if(customBgImg) {
                    config.bgImg = customBgImg.src; 
                }
                
                const blob = new Blob([JSON.stringify(config, null, 2)], { type: "application/json" });
                saveAs(blob, `小红书拼图排版模板_${Date.now()}.json`);
            });
        }

        const loadTplBtn = document.getElementById("load-tpl-btn");
        const tplFileInput = document.getElementById("tpl-file-input");
        if(loadTplBtn && tplFileInput) {
            loadTplBtn.addEventListener("click", () => tplFileInput.click());
            tplFileInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (f) => {
                    try {
                        const data = JSON.parse(f.target.result);
                        if(data.mode) {
                            document.querySelectorAll('#mode-group .style-btn').forEach(b => b.classList.remove('active'));
                            const modeBtn = document.querySelector(`#mode-group .style-btn[data-mode="${data.mode}"]`);
                            if(modeBtn) modeBtn.classList.add('active');
                            currentMode = data.mode;
                            initSettings(); 
                            
                            for(let key in data.params) {
                                const el = document.getElementById(key);
                                if(el) {
                                    if(el.type === 'checkbox') el.checked = data.params[key];
                                    else el.value = data.params[key];
                                }
                            }
                            
                            if(data.bgImg) {
                                const img = new Image();
                                img.onload = () => {
                                    customBgImg = img;
                                    const clearBtn = document.getElementById("param-bg-img-clear");
                                    if(clearBtn) clearBtn.style.display = "block";
                                    updateBorderUI();
                                    triggerRender();
                                };
                                img.src = data.bgImg;
                            } else {
                                customBgImg = null;
                                const clearBtn = document.getElementById("param-bg-img-clear");
                                if(clearBtn) clearBtn.style.display = 'none';
                                updateBorderUI();
                                triggerRender();
                            }
                            updateBorderUI();
                            triggerRender();
                            alert("模板排版配置已加载");
                        }
                    } catch(err) {
                        alert("读取失败：这不是有效的拼图模板配置");
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            });
        }

        // GSAP 动画初始化
        window.addEventListener('load', () => {
            gsap.to(".panel-card", {
                y: 0,
                opacity: 1,
                duration: 0.8,
                stagger: 0.1,
                ease: "power2.out"
            });
        });

        document.querySelectorAll('input[type="range"]').forEach(slider => {
            if (slider._hasDblclickReset) return;
            slider._hasDblclickReset = true;
            const defVal = slider.getAttribute('value') || slider.value || '0';
            slider.addEventListener('dblclick', () => {
                slider.value = defVal;
                slider.dispatchEvent(new Event('input', { bubbles: true }));
                slider.dispatchEvent(new Event('change', { bubbles: true }));
            });
        });
    }

    // 3. Eyedropper API integration for color inputs
    function initEyedropper() {
        if (!window.EyeDropper) return;
        document.querySelectorAll('input[type="color"]').forEach(colorInput => {
            if (colorInput.dataset.hasEyedropper) return;
            colorInput.dataset.hasEyedropper = "true";
            
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.innerHTML = '🎨';
            btn.title = '屏幕吸色';
            btn.style.marginLeft = '6px';
            btn.style.padding = '4px 6px';
            btn.style.background = 'rgba(255,255,255,0.06)';
            btn.style.border = '1px solid rgba(255,255,255,0.1)';
            btn.style.borderRadius = '6px';
            btn.style.color = '#fff';
            btn.style.cursor = 'pointer';
            btn.style.fontSize = '0.75rem';
            btn.style.display = 'inline-flex';
            btn.style.alignItems = 'center';
            btn.style.justifyContent = 'center';
            btn.style.height = '28px';
            btn.style.transition = '0.2s';
            btn.style.verticalAlign = 'middle';
            
            btn.onmouseover = () => btn.style.background = 'rgba(255,255,255,0.12)';
            btn.onmouseout = () => btn.style.background = 'rgba(255,255,255,0.06)';
            
            if (colorInput.nextSibling) {
                colorInput.parentNode.insertBefore(btn, colorInput.nextSibling);
            } else {
                colorInput.parentNode.appendChild(btn);
            }
            
            btn.onclick = async (e) => {
                e.preventDefault();
                try {
                    const dropper = new EyeDropper();
                    const result = await dropper.open();
                    colorInput.value = result.sRGBHex;
                    colorInput.dispatchEvent(new Event('input', { bubbles: true }));
                    colorInput.dispatchEvent(new Event('change', { bubbles: true }));
                } catch(err) {}
            };
        });
    }

    // Initialize all components
    function initAll() {
        initRangeResets();
        initEyedropper();
    }
    
    document.addEventListener("DOMContentLoaded", initAll);
    if (document.readyState === "interactive" || document.readyState === "complete") {
        initAll();
    }
})();
</script>
<!-- Unified Premium UX End -->
